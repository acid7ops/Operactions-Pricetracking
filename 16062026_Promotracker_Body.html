<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CC Promotracker — Histórico W14-W25</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efe8;color:#1a1a18;font-size:12px}
.topbar{background:#1a1a18;padding:.5rem 1.2rem;display:flex;align-items:center;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:0}
.tb-brand{color:white;font-size:13px;font-weight:700;padding-right:1rem;border-right:1px solid #333;margin-right:.5rem;white-space:nowrap}
.apl-tabs{display:flex;overflow-x:auto;flex:1}
.apl-tab{padding:.4rem .9rem;font-size:11px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.apl-tab:hover{color:#ccc;background:#2a2a28}
.apl-tab.active{color:white;border-bottom-color:#185FA5}
.tb-right{display:flex;gap:6px;align-items:center;padding-left:.75rem;border-left:1px solid #333;margin-left:auto}
.wbadge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
.wb-ok{background:#185FA5;color:white}
.btn{font-size:11px;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:500;background:#185FA5;color:white;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#0c447c}
.btn-ghost{background:transparent;border:1px solid #444;color:#ccc}
.btn-ghost:hover{background:#2a2a28}
.canalbar{background:white;border-bottom:1px solid #e0ded8;padding:.4rem 1.2rem;display:flex;gap:6px;align-items:center;position:sticky;top:38px;z-index:199;flex-wrap:wrap}
.cbtn{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666;font-weight:500}
.cbtn.active{background:#185FA5;color:white;border-color:#185FA5}
.csep{color:#ddd;margin:0 4px}
.cinfo{font-size:10px;color:#aaa}
.wk-focus{display:flex;align-items:center;gap:4px;margin-left:auto}
.wk-focus label{font-size:9px;color:#aaa;font-weight:700;text-transform:uppercase}
.wk-select{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:white;color:#185FA5;font-weight:700}
.page{max-width:1500px;margin:.85rem auto;padding:0 1rem}
.ph{background:white;border-radius:10px;padding:.75rem 1.1rem;margin-bottom:.7rem;border-left:4px solid #185FA5;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.ph-title{font-size:15px;font-weight:700}
.ph-sub{font-size:10px;color:#888;margin-top:2px}
.ph-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-blue{background:#e6f1fb;color:#185FA5}
.b-dark{background:#1a1a18;color:white}
.b-ps{background:#fff8e1;color:#e65100;border:1px solid #ffe082}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.7rem}
.kpi{background:white;border-radius:8px;padding:.6rem .8rem;border-left:3px solid #ddd}
.kpi.g{border-left-color:#2e6b10}.kpi.r{border-left-color:#a32d2d}.kpi.b{border-left-color:#185FA5}.kpi.gr{border-left-color:#bbb}
.kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa;margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:700}
.kpi-sub{font-size:8px;color:#bbb;margin-top:1px}
.cg{color:#2e6b10}.cr{color:#a32d2d}.cb{color:#185FA5}.cgr{color:#bbb}
.main{display:grid;grid-template-columns:1fr 230px;gap:.7rem;margin-bottom:.7rem}
.left-col{display:flex;flex-direction:column;gap:.7rem}
.rcol{display:flex;flex-direction:column;gap:.7rem}
.card{background:white;border-radius:10px;padding:.75rem 1rem;overflow-x:hidden}
.tbl-scroll{overflow-x:auto;max-width:100%}
.tbl-scroll-main{overflow-x:visible}
.tbl-scroll-main table.pt{width:100%}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
table.pt{border-collapse:collapse;font-size:11px}
table.pt th{font-size:8px;font-weight:700;color:#888;padding:3px 5px;border-bottom:1px solid #eee;text-align:center;background:#fafaf8;white-space:nowrap}
table.pt th.lh{text-align:left;min-width:90px;position:sticky;left:0;background:#fafaf8;z-index:3}
table.pt th.lhm{text-align:left;min-width:130px;position:sticky;left:90px;background:#fafaf8;z-index:3}
table.pt th.lhp{text-align:center;min-width:65px;position:sticky;left:220px;background:#fafaf8;z-index:3;border-right:2px solid #e0ded8}
table.pt th.wc{color:#185FA5;background:#e6f1fb}
table.pt td{padding:4px 5px;border-bottom:.5px solid #f5f5f2;text-align:center;vertical-align:middle;font-variant-numeric:tabular-nums;white-space:nowrap}
table.pt td.cli{text-align:left;font-weight:700;color:#185FA5;background:#f8f9ff;font-size:10px;position:sticky;left:0;z-index:2;min-width:90px;vertical-align:top;padding-top:6px}
table.pt td.mrc{text-align:left;min-width:130px;position:sticky;left:90px;background:#f8f9ff;z-index:2}
table.pt td.psug{text-align:center;min-width:65px;position:sticky;left:220px;background:#f8f9ff;z-index:2;border-right:2px solid #e0ded8;vertical-align:top;padding-top:6px}
.ps-badge{display:inline-flex;flex-direction:column;align-items:center;gap:1px}
.ps-badge .ps-icon{font-size:11px;line-height:1}
.ps-badge .ps-val{font-size:8px;font-weight:700;color:#e65100;background:#fff3e0;padding:1px 5px;border-radius:8px;white-space:nowrap}
table.pt td.wc{background:#eaf3fc}
table.pt td.wc-niv{background:#d6eaf8;font-weight:700;color:#185FA5}
table.pt tr:last-child td{border-bottom:none}
table.pt .tot-row td{background:#f0efe8;font-weight:700;font-size:10px}
table.pt .grp-sep td{border-top:2px solid #e0ded8}
.br{display:flex;align-items:center;gap:4px}
.bd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ix{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:32px;text-align:center}
.ix-g{background:#eaf3de;color:#2e6b10}
.ix-r{background:#fcebeb;color:#a32d2d}
.ix-na{background:#f0efe8;color:#ccc}
.pniv{font-size:10px;color:#e65100;font-weight:700}
.pcomp{font-size:10px;color:#555}
.psp{font-size:9px;color:#ccc}
.pna{font-size:9px;color:#ddd}
.arr-up{color:#a32d2d;font-weight:700;font-size:10px}
.arr-dn{color:#2e6b10;font-weight:700;font-size:10px}
.al-card{background:white;border-radius:10px;padding:.75rem 1rem}
.al-item{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:.5px solid #f5f5f2}
.al-item:last-child{border-bottom:none}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ar{background:#e24b4a}.ag{background:#53a832}.an{background:#aaa}
.atxt{font-size:10px;line-height:1.4;color:#1a1a18}
.ameta{font-size:8px;color:#aaa;margin-top:1px}
.footer{text-align:center;padding:.6rem;font-size:9px;color:#aaa;margin-top:.3rem}
.scroll-hint{font-size:8px;color:#bbb;font-style:italic}
/* Modal de gráfico */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal-box{background:white;border-radius:14px;max-width:96vw;width:100%;max-height:90vh;overflow:auto;padding:1.5rem}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-title{font-size:14px;font-weight:700}
.modal-close{background:#f0efe8;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:#888}
.modal-close:hover{background:#e0ded8}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;font-size:10px}
.chart-legend-item{display:flex;align-items:center;gap:4px}
.chart-legend-dot{width:9px;height:9px;border-radius:50%}
@media print{body{background:white}.topbar,.canalbar,.btn-graph{display:none}.page{padding:0;margin:0;max-width:100%}.main{grid-template-columns:1fr 190px}}
@page{size:A4 landscape;margin:.7cm .9cm}
</style>
</head>

  return '<span class="ix '+(v===90?'ix-g':'ix-r')+'">'+v+'%</span>';
}
function puCell(pu) {
  if (pu==='NA'||pu==='NT') return '<span class="pna">'+(pu||'NA')+'</span>';
  return FMT(pu);
}
function ppCell(pp, isNiv, prevPP, suppressArrow) {
  if (pp==='NA'||pp==='NT') return '<span class="pna">'+(pp||'NA')+'</span>';
  if (pp==='SP'||pp===null) return '<span class="psp">S/P</span>';
  var arrow='';
  if (!suppressArrow && prevPP!==undefined&&prevPP!=='SP'&&prevPP!==null&&prevPP!=='NA'&&typeof prevPP==='number') {
    if (pp>prevPP) arrow=' <span class="arr-up">&#8595;</span>';
    else if (pp<prevPP) arrow=' <span class="arr-dn">&#8593;</span>';
  }
  return '<span class="'+(isNiv?'pniv':'pcomp')+'">'+FMT(pp)+'</span>'+arrow;
}

  apl=a;
  ['1L','400'].forEach(function(k){ document.getElementById('tab-'+k).classList.toggle('active',k===a); });

}

  canal=c;

  document.getElementById('btn-hys').classList.toggle('active',c==='HYS');
  render();
}
function setFocusWeek(w) {

}

  var cfg     = CFG[apl];
  var clients = cfg.data[canal];

  var prevWeek = fwIdx>0 ? WEEKS_ALL[fwIdx-1] : null;

  var winStart = Math.max(0, fwIdx-3);
  var WIN = WEEKS_ALL.slice(winStart, fwIdx+1);

    canal==='PYP'?'Salcobrand · Preunic · Cruz Verde · Maicao · Ahumada'
                 :'Lider · Jumbo · Santa Isabel · Unimarc';

  document.getElementById('ph-focus').textContent = 'Ventana: '+WIN[0]+' – '+focusWeek;

  // Week selector
  var wkSel = document.getElementById('wk-select');

      if(mi===0){
        row+='<td class="cli" rowspan="'+totalRows+'">'+(names[cli]||cli)+'</td>';
        var psContent = d.ps ? '<div class="ps-badge"><span class="ps-icon">🏷️</span><span class="ps-val">'+d.ps+'</span></div>' : '<span style="color:#ddd">—</span>';
        row+='<td class="psug" rowspan="'+totalRows+'">'+psContent+'</td>';
      }
      row+='<td class="mrc"><div class="br"><div class="bd" style="background:'+m.col+'"></div>'+(isN?'<strong>'+m.lbl+'</strong>':m.lbl)+'</div></td>';
      WIN.forEach(function(s){
        var globalIdx = WEEKS_ALL.indexOf(s);
        var iC=s===focusWeek;
        var entry=d[m.key]?d[m.key][s]:null;
        var prevEntry=globalIdx>0&&d[m.key]?d[m.key][WEEKS_ALL[globalIdx-1]]:null;
        var pu=entry?entry.pu:null;
        var pp=entry?entry.pp:null;
        var prevPP=prevEntry?prevEntry.pp:undefined;
        var wcN=iC&&isN?'wc-niv':(iC?'wc':'');
        row+='<td class="'+wcN+'">'+puCell(pu)+'</td>';
        row+='<td class="'+wcN+'">'+ppCell(pp,isN,prevPP,!!d.promoNote)+'</td>';
        row+='<td class="'+(iC?'wc':'')+'"></td>';
      });
      row+='</tr>';
      tbody+=row;
    });

    ixRowsCfg.forEach(function(ix){
      var row='<tr>';
      row+='<td class="mrc" style="padding-left:14px;color:'+ix.col+';font-size:9px;font-style:italic">'+ix.lbl+'</td>';
      WIN.forEach(function(s){
        var iC=s===focusWeek, wc=iC?'wc':'';
        var ixKey = ix.key+'_IX';
        var ixVal = d[ixKey] ? d[ixKey][s] : null;
        row+='<td class="'+wc+'"></td><td class="'+wc+'"></td><td class="'+wc+'">'+ixPill(ixVal)+'</td>';
      });
      row+='</tr>';
      tbody+=row;
    });
  });

  // Total IX rows
  cfg.totKeys.forEach(function(tk, ti){
    var cls=ti===0?'tot-row grp-sep':'tot-row';
    var row='<tr class="'+cls+'">'+
      '<td class="cli" style="color:'+cfg.totCol[tk]+';font-weight:700;font-size:10px" colspan="2">'+cfg.totLbls[tk]+'</td>'+
      '<td class="psug"></td>';
    WIN.forEach(function(s){
      var iC=s===focusWeek, wc=iC?'wc':'';
      var v=tot[tk]?tot[tk][s]:null;
      row+='<td class="'+wc+'"></td><td class="'+wc+'"></td><td class="'+wc+'">'+ixPill(v)+'</td>';
    });
    row+='</tr>';
    tbody+=row;
  });

  tbody+='</tbody>';
  document.getElementById('tbl-main').innerHTML=thead+tbody;

  // ALERTAS — comparing prevWeek -> focusWeek
  var alerts=[];
  if (prevWeek) {
    cfg.alertBrands.forEach(function(m){
      cliList.forEach(function(cli){
        var d=clients[cli];
        var dPrev=d[m.key]?d[m.key][prevWeek]:null;
        var dCurr=d[m.key]?d[m.key][focusWeek]:null;
        if(!dPrev||!dCurr) return;
        if(dPrev.pu==='NA'||dCurr.pu==='NA'||dPrev.pu==='NT'||dCurr.pu==='NT') return;
        var p4=dPrev.pp, p5=dCurr.pp, u4=dPrev.pu, u5=dCurr.pu;
        var msg='<span style="color:'+m.col+';font-weight:600">'+m.lbl+'</span> · '+(names[cli]||cli)+': ';
        var t='an';
        if(p4!==p5){
          if((p4==='SP'||p4===null)&&typeof p5==='number'){ msg+='entra promo → '+FMT(p5); t='ag'; }
          else if(typeof p4==='number'&&(p5==='SP'||p5===null)){ msg+='sale promo → S/P'; t='ar'; }
          else if(typeof p4==='number'&&typeof p5==='number'){
            if(p5>p4){msg+=FMT(p4)+' ↑ → '+FMT(p5);t='ar';}
            else{msg+=FMT(p4)+' ↓ → '+FMT(p5);t='ag';}
          } else return;
        } else if(u4!==u5&&typeof u4==='number'&&typeof u5==='number'){
          if(u5>u4){msg+='P.Unit sube '+FMT(u4)+' → '+FMT(u5);t='ar';}
          else{msg+='P.Unit baja '+FMT(u4)+' → '+FMT(u5);t='ag';}
        } else return;
        alerts.push({t:t,msg:msg,meta:prevWeek+' → '+focusWeek});
      });
    });
  }
  if(!alerts.length) alerts.push({t:'ag',msg:'Sin cambios '+(prevWeek?prevWeek+' → '+focusWeek:focusWeek),meta:''});

  var promoNotes=[];
  cliList.forEach(function(cli){
    var d=clients[cli];
    if(d.promoNote){
      promoNotes.push({t:'an',msg:'<strong>'+(names[cli]||cli)+'</strong>: '+d.promoNote,meta:'Nota de mercado'});
    }
  });
  alerts = promoNotes.concat(alerts);

  document.getElementById('alertas').innerHTML=alerts.map(function(a){
    return '<div class="al-item"><div class="adot '+a.t+'"></div><div><div class="atxt">'+a.msg+'</div><div class="ameta">'+a.meta+'</div></div></div>';
  }).join('');

  document.getElementById('footer').textContent=
    cfg.label+' · Canal '+cLabel+' · Ventana '+WIN[0]+'-'+focusWeek+' (histórico completo W14-W25 disponible) · '+
    new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

/* ══ TABLA HISTÓRICA COMPLETA W14-W25 ══ */
function openChart() {
  var cfg = CFG[apl];
  var clients = cfg.data[canal];
  var cliList = Object.keys(clients);
  var names = canal==='PYP'?NAMES_PYP:NAMES_HYS;
  var cLabel = canal==='PYP'?'P&P':'H&S';
  var tot = cfg.totales[canal];
  var marcas = cfg.marcas;
  var ixRowsCfg = cfg.ixRows;

  document.getElementById('modal-title').textContent =
    'Histórico completo W14 — W25 · '+cfg.label+' · '+cLabel;

  var thead='<thead><tr>'+
    '<th class="lh" rowspan="2">Cliente</th>'+
    '<th class="lhm" rowspan="2">Marca / Producto</th>'+
    '<th class="lhp" rowspan="2">P.Sug.</th>';
  WEEKS_ALL.forEach(function(s){
    thead+='<th colspan="3">'+s+'</th>';
  });
  thead+='</tr><tr>';
  WEEKS_ALL.forEach(function(){
    thead+='<th style="min-width:64px">P.Unit</th><th style="min-width:64px">P.Promo</th><th style="min-width:38px">IX</th>';
  });
  thead+='</tr></thead>';

  var tbody='<tbody>';
  cliList.forEach(function(cli, ci){
    var d=clients[cli];
    var totalRows=marcas.length+ixRowsCfg.length;
    var sepCls=ci>0?'grp-sep':'';

    marcas.forEach(function(m, mi){
      var isN=m.isN;
      var row='<tr'+(mi===0&&sepCls?' class="'+sepCls+'"':'')+'>';
      if(mi===0){
        row+='<td class="cli" rowspan="'+totalRows+'">'+(names[cli]||cli)+'</td>';
        var psContent = d.ps ? '<div class="ps-badge"><span class="ps-icon">🏷️</span><span class="ps-val">'+d.ps+'</span></div>' : '<span style="color:#ddd">—</span>';
        row+='<td class="psug" rowspan="'+totalRows+'">'+psContent+'</td>';
      }
      row+='<td class="mrc"><div class="br"><div class="bd" style="background:'+m.col+'"></div>'+(isN?'<strong>'+m.lbl+'</strong>':m.lbl)+'</div></td>';
      WEEKS_ALL.forEach(function(s,si){
        var entry=d[m.key]?d[m.key][s]:null;
        var prevEntry=si>0&&d[m.key]?d[m.key][WEEKS_ALL[si-1]]:null;
        var pu=entry?entry.pu:null;
        var pp=entry?entry.pp:null;
        var prevPP=prevEntry?prevEntry.pp:undefined;
        row+='<td>'+puCell(pu)+'</td>';
        row+='<td>'+ppCell(pp,isN,prevPP,!!d.promoNote)+'</td>';
        row+='<td></td>';
      });
      row+='</tr>';
      tbody+=row;
    });

    ixRowsCfg.forEach(function(ix){
      var row='<tr>';
      row+='<td class="mrc" style="padding-left:14px;color:'+ix.col+';font-size:9px;font-style:italic">'+ix.lbl+'</td>';
      WEEKS_ALL.forEach(function(s){
        var ixKey = ix.key+'_IX';
        var ixVal = d[ixKey] ? d[ixKey][s] : null;
        row+='<td></td><td></td><td>'+ixPill(ixVal)+'</td>';
      });
      row+='</tr>';
      tbody+=row;
    });
  });

  cfg.totKeys.forEach(function(tk, ti){
    var cls=ti===0?'tot-row grp-sep':'tot-row';
    var row='<tr class="'+cls+'">'+
      '<td class="cli" style="color:'+cfg.totCol[tk]+';font-weight:700;font-size:10px" colspan="2">'+cfg.totLbls[tk]+'</td>'+
      '<td class="psug"></td>';
    WEEKS_ALL.forEach(function(s){
      var v=tot[tk]?tot[tk][s]:null;
      row+='<td></td><td></td><td>'+ixPill(v)+'</td>';
    });
    row+='</tr>';
    tbody+=row;
  });

  tbody+='</tbody>';
  document.getElementById('tbl-hist').innerHTML = thead+tbody;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeChart(){ document.getElementById('modal-overlay').classList.remove('open'); }

render();
</script>
