<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<title>CC Promotracker — Histórico W14-W30</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --nivea:#0057A8; --nivea-deep:#00294F; --nivea-mid:#0A3D73; --nivea-light:#E6F1FB;
  --ink:#0B1C2C; --muted:#5B6B7C; --faint:#8698A8;
  --paper:#FFFFFF; --canvas:#EEF3F9; --line:#DCE6F0; --mist:#E7EFF8;
  --green:#158A4A; --green-bg:#EAF3DE; --red:#C0392B; --red-bg:#FCEBEB;
  --amber:#D89A1F; --orange:#E65100;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
  --sh-sm:0 1px 3px rgba(10,27,46,.07);
  --sh-md:0 4px 16px rgba(10,27,46,.09);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{
  font-family:'Inter',sans-serif;
  background:var(--canvas);
  color:var(--ink);
  font-size:12px;
  overflow-x:hidden;
  max-width:100vw;
  -webkit-font-smoothing:antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}

/* ── Topbar ── */
.topbar{
  background:linear-gradient(135deg, var(--nivea-deep) 0%, var(--nivea-mid) 100%);
  padding:.55rem 1.4rem;
  display:flex;align-items:center;
  position:sticky;top:0;z-index:200;
  flex-wrap:wrap;gap:0;
  box-shadow:0 4px 20px rgba(10,27,46,.18);
}
/* shelf-tick accent line under topbar */
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--nivea-mid),var(--nivea),var(--nivea-mid));
}
.tb-brand{
  color:white;
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:-.01em;
  padding-right:1.1rem;border-right:1px solid rgba(255,255,255,.18);
  margin-right:.8rem;white-space:nowrap;
  display:flex;flex-direction:column;gap:1px;
}
.tb-brand::before{
  content:'DEO PROMOTRACKER';
  font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;letter-spacing:.14em;
  color:#A9CDEF;font-weight:500;
}
.apl-tabs{display:flex;overflow-x:auto;flex:1}
.apl-tab{
  padding:.5rem 1rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;font-weight:500;
  color:#8FB6DD;cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:color .15s,border-color .15s;
  letter-spacing:.02em;
}
.apl-tab:hover{color:#fff}
.apl-tab.active{color:#fff;border-bottom-color:#fff}
.tb-right{display:flex;gap:6px;align-items:center;padding-left:.85rem;border-left:1px solid rgba(255,255,255,.15);margin-left:auto}
.wbadge{
  font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;font-weight:600;
  padding:3px 10px;border-radius:20px;letter-spacing:.04em;
}
.wb-ok{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn{
  font-family:'Inter',sans-serif;
  font-size:11px;padding:5px 13px;border-radius:var(--r-sm);
  border:none;cursor:pointer;font-weight:600;
  background:rgba(255,255,255,.15);color:white;
  transition:background .15s;
  letter-spacing:.01em;
}
.btn:hover{background:rgba(255,255,255,.28)}
.hist-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;font-weight:600;padding:3px 10px;
  border-radius:20px;border:1px solid var(--nivea);
  background:white;color:var(--nivea);cursor:pointer;
  white-space:nowrap;letter-spacing:.02em;
  transition:all .15s;
}
.hist-btn:hover{background:var(--nivea-light)}
.hist-btn.active{background:var(--nivea);color:white}

/* ── Canal bar ── */
.canalbar{
  background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:.45rem 1.4rem;
  display:flex;gap:6px;align-items:center;
  position:sticky;top:42px;z-index:199;
  box-shadow:var(--sh-sm);
}
.cbtn{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;font-weight:600;
  padding:4px 14px;border-radius:20px;
  border:1px solid var(--line);
  background:transparent;cursor:pointer;color:var(--muted);
  transition:all .15s;letter-spacing:.03em;
}
.cbtn:hover{border-color:var(--nivea);color:var(--nivea)}
.cbtn.active{background:var(--nivea-deep);color:white;border-color:var(--nivea-deep)}
.csep{color:var(--line);margin:0 4px}
.cinfo{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--faint);letter-spacing:.03em}

/* ── Page layout ── */
.page{max-width:1200px;margin:.9rem auto;padding:0 1.2rem}

/* ── Page header ── */
.ph{
  background:white;
  border-radius:var(--r-lg);
  padding:.8rem 1.2rem;
  margin-bottom:.75rem;
  border-left:4px solid var(--nivea);
  display:flex;justify-content:space-between;align-items:flex-start;
  flex-wrap:wrap;gap:8px;
  box-shadow:var(--sh-sm);
}
.ph-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:16px;font-weight:600;letter-spacing:-.01em;
}
.ph-sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;color:var(--faint);
  margin-top:3px;letter-spacing:.04em;
}
.ph-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;font-weight:600;
  padding:3px 9px;border-radius:20px;
  letter-spacing:.04em;
}
.b-blue{background:var(--nivea-light);color:var(--nivea)}
.b-dark{background:var(--nivea-deep);color:white}
.b-ps{background:#FFF8E1;color:#B8620A;border:1px solid #FFE082}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem}
.kpi{
  background:white;border-radius:var(--r-md);
  padding:.7rem .9rem;
  border:1px solid var(--line);
  border-left:3px solid var(--line);
  box-shadow:var(--sh-sm);
  transition:box-shadow .15s,transform .15s;
}
.kpi:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.kpi.g{border-left-color:var(--green)}
.kpi.r{border-left-color:var(--red)}
.kpi.b{border-left-color:var(--nivea)}
.kpi-lbl{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--faint);margin-bottom:4px;
}
.kpi-val{
  font-family:'Space Grotesk',sans-serif;
  font-size:24px;font-weight:600;letter-spacing:-.01em;
}
.kpi-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--faint);margin-top:2px;letter-spacing:.03em}
.cg{color:var(--green)}.cr{color:var(--red)}.cb{color:var(--nivea)}.cgr{color:var(--faint)}

/* ── Layout ── */
.main{display:grid;grid-template-columns:1fr 240px;gap:.75rem;margin-bottom:.75rem}
.left-col{display:flex;flex-direction:column;gap:.75rem}
.rcol{display:flex;flex-direction:column;gap:.75rem}

/* ── Cards ── */
.card{
  background:white;border-radius:var(--r-lg);
  padding:.85rem 1.1rem;overflow:visible;
  border:1px solid var(--line);
  box-shadow:var(--sh-sm);
}
.card.hist-mode{overflow-x:auto}
.sec-lbl{
  font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:var(--faint);margin-bottom:.6rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
}

/* ── Table ── */
table.pt{width:100%;border-collapse:collapse;font-size:11px}
.card.hist-mode table.pt{width:auto}
.card.hist-mode table.pt th[data-sem]{min-width:92px}
table.pt th{
  font-family:'IBM Plex Mono',monospace;
  font-size:7.5px;font-weight:600;color:var(--faint);
  padding:4px 6px;border-bottom:1px solid var(--line);
  text-align:center;background:var(--canvas);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;
}
table.pt th.lh{text-align:left;min-width:115px;position:sticky;left:0;background:var(--canvas);z-index:2}
table.pt th.lhm{text-align:left;min-width:60px}
table.pt th.wc{color:var(--nivea);background:var(--nivea-light)}
table.pt th.hd{color:#0F6E56}
table.pt th.hr{color:#854F0B}
table.pt td{
  padding:5px 6px;border-bottom:.5px solid var(--mist);
  text-align:center;vertical-align:middle;
  font-variant-numeric:tabular-nums;
}
table.pt td.cli{
  text-align:left;font-family:'Space Grotesk',sans-serif;
  font-weight:600;color:var(--nivea-deep);
  background:#F5F8FD;font-size:10.5px;
  position:sticky;left:0;z-index:1;min-width:115px;
  vertical-align:top;padding-top:7px;
  border-right:1px solid var(--line);
}
table.pt td.mrc{text-align:left;min-width:60px}
table.pt td.wc{background:#EBF4FC}
table.pt td.wc-niv{background:#D6EAF8;font-weight:700;color:var(--nivea-deep)}
table.pt td.pend{color:var(--faint);font-size:9px}
table.pt tr:last-child td{border-bottom:none}
table.pt .tot-row td{
  background:var(--canvas);
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;font-size:9.5px;
  border-top:1px solid var(--line);
}
table.pt tr:hover td:not(.cli){background:var(--mist)}
.br{display:flex;align-items:center;gap:5px}
.bd{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── IX Pills ── */
.ix{
  display:inline-block;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;font-weight:600;
  padding:2px 7px;border-radius:20px;
  min-width:34px;text-align:center;letter-spacing:.02em;
}
.ix-g{background:var(--green-bg);color:var(--green)}
.ix-r{background:var(--red-bg);color:var(--red)}
.ix-na{background:var(--mist);color:var(--faint)}

/* ── Promo labels ── */
.promo-niv{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--orange);font-weight:600;
}
.promo-comp{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted)}
.promo-sp{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--faint)}
.promo-p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);font-weight:600}
.arr-up{color:var(--red);font-weight:700;font-size:10px}
.arr-dn{color:var(--green);font-weight:700;font-size:10px}

/* ── Alerts panel ── */
.al-card{
  background:white;border-radius:var(--r-lg);
  padding:.85rem 1rem;
  border:1px solid var(--line);box-shadow:var(--sh-sm);
}
.al-item{
  display:flex;align-items:flex-start;gap:7px;
  padding:6px 0;border-bottom:.5px solid var(--mist);
}
.al-item:last-child{border-bottom:none}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ar{background:var(--red)}.ag{background:var(--green)}.ap{background:#9C27B0}
.atxt{font-size:10.5px;line-height:1.5;color:var(--ink)}
.ameta{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--faint);margin-top:2px;letter-spacing:.03em}

/* ── Chart card ── */
.chart-card{
  background:white;border-radius:var(--r-lg);
  padding:.9rem 1.2rem;margin-bottom:.75rem;
  border:1px solid var(--line);box-shadow:var(--sh-sm);
}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:9.5px;color:var(--muted);margin-bottom:6px}
.legend span{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.lb{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ch-wrap{position:relative;height:200px;width:100%}
.up{color:var(--green);font-size:9px;font-weight:700}
.dn{color:var(--red);font-size:9px;font-weight:700}
.eq{color:var(--faint);font-size:9px}

/* ── Footer ── */
.footer{
  text-align:center;padding:.7rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;color:var(--faint);
  margin-top:.3rem;letter-spacing:.04em;
}

/* ── Print ── */
@media print{
  body{background:white}
  .topbar,.canalbar{display:none}
  .page{padding:0;margin:0;max-width:100%}
  .main{grid-template-columns:1fr 200px}
  .ch-wrap{height:160px}
  .kpi:hover,.card:hover{transform:none;box-shadow:none}
}
@page{size:A4 landscape;margin:.7cm .9cm}

/* ── CC-specific additions ── */
.wk-focus{display:flex;align-items:center;gap:5px;margin-left:auto}
.wk-focus label{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.wk-select{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);background:white;color:var(--nivea);font-weight:600;cursor:pointer}
.ps-val{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;color:var(--orange);background:#FFF8E1;padding:2px 6px;border-radius:8px;white-space:nowrap}
.tbl-scroll{overflow-x:auto;max-width:100%}
.tbl-scroll-main{overflow-x:visible}
.tbl-scroll-main table.pt{width:100%}
table.pt th.lhp{text-align:center;width:65px;min-width:65px;max-width:65px;position:sticky;left:220px;background:var(--canvas);z-index:3;border-right:2px solid var(--line);overflow:hidden;font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:.04em}
table.pt td.lh{text-align:left;width:90px;min-width:90px;max-width:90px;position:sticky;left:0;background:var(--canvas);z-index:3;overflow:hidden}
table.pt td.lhm{text-align:left;width:130px;min-width:130px;max-width:130px;position:sticky;left:90px;background:var(--canvas);z-index:3;overflow:hidden}
table.pt td.psug{text-align:center;width:65px;min-width:65px;max-width:65px;position:sticky;left:220px;background:#F5F8FD;z-index:2;border-right:2px solid var(--line);vertical-align:top;padding-top:7px;overflow:hidden}
table.pt th.lh{width:90px;min-width:90px;max-width:90px;overflow:hidden}
table.pt th.lhm{width:130px;min-width:130px;max-width:130px;overflow:hidden;position:sticky;left:90px;background:var(--canvas);z-index:3}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(11,28,44,.55);z-index:500;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-box{background:white;border-radius:var(--r-lg);max-width:96vw;width:100%;max-height:90vh;overflow:auto;padding:1.5rem;box-shadow:0 24px 64px rgba(10,27,46,.22)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--nivea-deep)}
.modal-close{background:var(--canvas);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px;color:var(--muted)}
.modal-close:hover{background:var(--line)}
.btn-ghost{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:white;font-size:10px;padding:4px 11px;border-radius:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:.03em;transition:background .15s}
.btn-ghost:hover{background:rgba(255,255,255,.25)}
table.pt td.cli{border-right:1px solid var(--line);font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--nivea-deep);background:#F5F8FD;font-size:10.5px;position:sticky;left:0;z-index:2;width:90px;min-width:90px;max-width:90px;vertical-align:top;padding-top:7px;overflow:hidden}
table.pt td.mrc{text-align:left;width:130px;min-width:130px;max-width:130px;position:sticky;left:90px;background:#F5F8FD;z-index:2;overflow:hidden}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand" style="display:flex;flex-direction:column;gap:1px"><span style='font-family:&quot;IBM Plex Mono&quot;,monospace;font-size:8.5px;letter-spacing:.14em;color:#A9CDEF;font-weight:500'>CC PROMOTRACKER</span>Nivea · Chile</div>
  <div class="apl-tabs">
    <div class="apl-tab active" id="tab-1L"   onclick="setApl('1L')">Crema 1 Litro</div>
    <div class="apl-tab"        id="tab-400"  onclick="setApl('400')">Crema 400ml</div>
  </div>
  <div class="tb-right">
    <span class="wbadge wb-ok">W30 actualizado</span>
    <button class="btn btn-ghost" onclick="openChart()">🗓 Ver histórico W14-W30</button>
    <button class="btn" onclick="window.print()">&#8659; PDF</button>
  </div>
</div>

<div class="canalbar">
  <button class="cbtn active" id="btn-pyp" onclick="setCanal('PYP')">P&amp;P</button>
  <button class="cbtn"        id="btn-hys" onclick="setCanal('HYS')">H&amp;S</button>
  <span class="csep">|</span>
  <span class="cinfo" id="cinfo"></span>
  <div class="wk-focus">
    <label>Semana foco:</label>
    <select class="wk-select" id="wk-select" onchange="setFocusWeek(this.value)"></select>
  </div>
</div>

<div class="page">
  <div class="ph">
    <div>
      <div class="ph-title" id="ph-title"></div>
      <div class="ph-sub">Histórico W14 &middot; W26 &middot; <span id="ph-focus"></span></div>
    </div>
    <div class="ph-badges" id="ph-badges"></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="main">
    <div class="left-col">
      <div class="card">
        <div class="sec-lbl">
          <span>P.Unit &middot; P.Promo &middot; IX vs competidor
          &nbsp;&nbsp;
          <span style="font-weight:400;text-transform:none;font-size:8px;color:#bbb">
            <span style="color:#e65100;font-weight:600">Naranja</span> = promo Nivea &middot;
            <span style="color:#2e6b10">&#8593;</span> precio baja &middot;
            <span style="color:#a32d2d">&#8595;</span> precio sube &middot;
            <span style="background:#eaf3de;color:#2e6b10;padding:0 3px;border-radius:3px;font-weight:700">=90%</span> ok &middot;
            <span style="background:#fcebeb;color:#a32d2d;padding:0 3px;border-radius:3px;font-weight:700">&ne;90%</span> alerta
          </span></span>
          </span>
        </div>
        <div class="tbl-scroll tbl-scroll-main"><table class="pt" id="tbl-main"></table></div>
      </div>
    </div>
    <div class="rcol">
      <div class="al-card">
        <div class="sec-lbl">Cambios semana anterior &rarr; foco</div>
        <div id="alertas"></div>
      </div>
    </div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<!-- MODAL HISTÓRICO -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeChart()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Histórico completo W14 — W30</div>
      <button class="modal-close" onclick="closeChart()">✕</button>
    </div>
    <div class="tbl-scroll"><table class="pt" id="tbl-hist"></table></div>
  </div>
</div>

<script>
var DATA_1L = {
  PYP: {
    SB: {
      ps: 7990,

    ],
    totKeys: ['IXN_FF','IXD','IXL'],
    totLbls: {IXN_FF:'Total IX NIVEA FF 400ML',IXD:'Total IX DOVE 400ML',IXL:'Total IX LACTOVIT 400ML'},

    kpiLbls: {IXN_FF:'IX vs Nivea FF 400ml',IXD:'IX vs Dove 400ml',IXL:'IX vs Lactovit 400ml'},
    data: DATA_400,
    totales: TOT_400,
    alertBrands: [

function setApl(a) {
  apl=a;
  ['1L','400'].forEach(function(k){ document.getElementById('tab-'+k).classList.toggle('active',k===a); });
  render();
}
function setCanal(c) {
  canal=c;
  document.getElementById('btn-pyp').classList.toggle('active',c==='PYP');
  document.getElementById('btn-hys').classList.toggle('active',c==='HYS');
  render();
}
function setFocusWeek(w) {
  focusWeek = w;
  render();
}

function render() {
  var cfg     = CFG[apl];
  var clients = cfg.data[canal];
  var cliList = Object.keys(clients);
  var names   = canal==='PYP'?NAMES_PYP:NAMES_HYS;
  var cLabel  = canal==='PYP'?'P&P':'H&S';
  var tot     = cfg.totales[canal];
  var fwIdx   = WEEKS_ALL.indexOf(focusWeek);
  var prevWeek = fwIdx>0 ? WEEKS_ALL[fwIdx-1] : null;

  // Ventana móvil de 4 semanas terminando en focusWeek
  var winStart = Math.max(0, fwIdx-3);
  var WIN = WEEKS_ALL.slice(winStart, fwIdx+1);

  document.getElementById('cinfo').textContent =
    canal==='PYP'?'Salcobrand · Preunic · Cruz Verde · Maicao · Ahumada'
                 :'Lider · Jumbo · Santa Isabel · Unimarc';
  document.getElementById('ph-title').textContent = cfg.label+' — Canal '+cLabel;
  document.getElementById('ph-focus').textContent = 'Ventana: '+WIN[0]+' – '+focusWeek;

  // Week selector
  var wkSel = document.getElementById('wk-select');
  wkSel.innerHTML = WEEKS_ALL.map(function(w){ return '<option value="'+w+'"'+(w===focusWeek?' selected':'')+'>'+w+'</option>'; }).join('');

  // Badges
  document.getElementById('ph-badges').innerHTML=
    '<span class="badge b-blue">Ventana: '+WIN[0]+'–'+focusWeek+'</span>'+
    '<span class="badge b-dark">'+cLabel+'</span>';

  // KPIs
  function kpiCls(v){ return v==null?'gr':v===90?'g':'r'; }
  function kpiCol(v){ return v==null?'cgr':v===90?'cg':'cr'; }
  var kpisHtml = cfg.totKeys.map(function(k){
    var v = tot[k]?tot[k][focusWeek]:null;
    return '<div class="kpi '+kpiCls(v)+'"><div class="kpi-lbl">'+cfg.kpiLbls[k]+'</div>'+
           '<div class="kpi-val '+kpiCol(v)+'">'+(v!=null?v+'%':'—')+'</div>'+
           '<div class="kpi-sub">'+focusWeek+' · '+cLabel+'</div></div>';
  });
  document.getElementById('kpis').innerHTML=kpisHtml.join('');

  // TABLE — ventana de 4 semanas, columnas sticky: Cliente | Marca | P.Sugerido
  var marcas  = cfg.marcas;
  var ixRowsCfg = cfg.ixRows;

  var thead='<thead><tr>'+
    '<th class="lh" rowspan="2">Cliente</th>'+
    '<th class="lhm" rowspan="2">Marca / Producto</th>'+
    '<th class="lhp" rowspan="2">P.Sug.</th>';
  WIN.forEach(function(s){
    var iC=s===focusWeek;
    thead+='<th colspan="3" class="'+(iC?'wc':'')+'">'+s+(iC?' ●':'')+'</th>';
  });
  thead+='</tr><tr>';
  WIN.forEach(function(s){
    var iC=s===focusWeek, wc=iC?'wc':'';
    thead+='<th class="'+wc+'" style="min-width:68px">P.Unit</th>'+
           '<th class="'+wc+'" style="min-width:68px">P.Promo</th>'+
           '<th class="'+wc+'" style="min-width:42px">IX</th>';
  });
  thead+='</tr></thead>';

  var tbody='<tbody>';

  cliList.forEach(function(cli, ci){
    var d=clients[cli];
    var totalRows=marcas.length+ixRowsCfg.length;
    var sepCls=ci>0?'grp-sep':'';

    marcas.forEach(function(m, mi){
      var isN=m.isN;
      var row='<tr'+(mi===0&&sepCls?' class="'+sepCls+'"':'')+'>';
      if(mi===0){
        row+='<td class="cli" rowspan="'+totalRows+'">'+(names[cli]||cli)+'</td>';
      }
      row+='<td class="mrc"><div class="br"><div class="bd" style="background:'+m.col+'"></div>'+(isN?'<strong>'+m.lbl+'</strong>':m.lbl)+'</div></td>';
      var psVal = null;
      if (m.key==='NIV') psVal = d.ps;
      else if (m.key==='NIV2' && d.psMap) psVal = d.psMap.NIV2;
      var psContent = psVal ? '<span class="ps-val">'+psVal+'</span>' : '<span style="color:#ddd">—</span>';
      row+='<td class="psug">'+psContent+'</td>';
      WIN.forEach(function(s){
        var globalIdx = WEEKS_ALL.indexOf(s);
        var iC=s===focusWeek;
        var entry=d[m.key]?d[m.key][s]:null;
        var prevEntry=globalIdx>0&&d[m.key]?d[m.key][WEEKS_ALL[globalIdx-1]]:null;
        var pu=entry?entry.pu:null;
        var pp=entry?entry.pp:null;
        var prevPP=prevEntry?prevEntry.pp:undefined;
        var wcN=iC&&isN?'wc-niv':(iC?'wc':'');
        row+='<td class="'+wcN+'">'+puCell(pu)+'</td>';
        row+='<td class="'+wcN+'">'+ppCell(pp,isN,prevPP,isPromoActiveAt(d,s))+'</td>';
        row+='<td class="'+(iC?'wc':'')+'"></td>';
      });
      row+='</tr>';
      tbody+=row;
    });

    ixRowsCfg.forEach(function(ix){
      var row='<tr>';
      row+='<td class="mrc" style="padding-left:14px;color:'+ix.col+';font-size:9px;font-style:italic">'+ix.lbl+'</td>';
      row+='<td class="psug"></td>';
      WIN.forEach(function(s){
        var iC=s===focusWeek, wc=iC?'wc':'';
        var ixKey = ix.key+'_IX';
        var ixVal = d[ixKey] ? d[ixKey][s] : null;
        row+='<td class="'+wc+'"></td><td class="'+wc+'"></td><td class="'+wc+'">'+ixPill(ixVal)+'</td>';
      });
      row+='</tr>';
      tbody+=row;
    });
  });

  // Total IX rows
  cfg.totKeys.forEach(function(tk, ti){
    var cls=ti===0?'tot-row grp-sep':'tot-row';
    var row='<tr class="'+cls+'">'+
      '<td class="cli" style="color:'+cfg.totCol[tk]+';font-weight:700;font-size:10px" colspan="2">'+cfg.totLbls[tk]+'</td>'+
      '<td class="psug"></td>';
    WIN.forEach(function(s){
      var iC=s===focusWeek, wc=iC?'wc':'';
      var v=tot[tk]?tot[tk][s]:null;
      row+='<td class="'+wc+'"></td><td class="'+wc+'"></td><td class="'+wc+'">'+ixPill(v)+'</td>';
    });
    row+='</tr>';
    tbody+=row;
  });

  tbody+='</tbody>';
  document.getElementById('tbl-main').innerHTML=thead+tbody;

  // ALERTAS — comparing prevWeek -> focusWeek
  var alerts=[];
  if (prevWeek) {
    cfg.alertBrands.forEach(function(m){
      cliList.forEach(function(cli){
        var d=clients[cli];
        var dPrev=d[m.key]?d[m.key][prevWeek]:null;
        var dCurr=d[m.key]?d[m.key][focusWeek]:null;
        if(!dPrev||!dCurr) return;
        if(dPrev.pu==='NA'||dCurr.pu==='NA'||dPrev.pu==='NT'||dCurr.pu==='NT') return;
        var p4=dPrev.pp, p5=dCurr.pp, u4=dPrev.pu, u5=dCurr.pu;
        var msg='<span style="color:'+m.col+';font-weight:600">'+m.lbl+'</span> · '+(names[cli]||cli)+': ';
        var t='an';
        if(p4!==p5){
          if((p4==='SP'||p4===null)&&typeof p5==='number'){ msg+='entra promo → '+FMT(p5); t='ag'; }
          else if(typeof p4==='number'&&(p5==='SP'||p5===null)){ msg+='sale promo → S/P'; t='ar'; }
          else if(typeof p4==='number'&&typeof p5==='number'){
            if(p5>p4){msg+=FMT(p4)+' ↑ → '+FMT(p5);t='ar';}
            else{msg+=FMT(p4)+' ↓ → '+FMT(p5);t='ag';}
          } else return;
        } else if(u4!==u5&&typeof u4==='number'&&typeof u5==='number'){
          if(u5>u4){msg+='P.Unit sube '+FMT(u4)+' → '+FMT(u5);t='ar';}
          else{msg+='P.Unit baja '+FMT(u4)+' → '+FMT(u5);t='ag';}
        } else return;
        alerts.push({t:t,msg:msg,meta:prevWeek+' → '+focusWeek});
      });
    });
  }
  if(!alerts.length) alerts.push({t:'ag',msg:'Sin cambios '+(prevWeek?prevWeek+' → '+focusWeek:focusWeek),meta:''});

  var promoNotes=[];
  cliList.forEach(function(cli){
    var d=clients[cli];
    if(isPromoActiveAt(d, focusWeek)){
      promoNotes.push({t:'an',msg:'<strong>'+(names[cli]||cli)+'</strong>: '+d.promoNote.text,meta:'Nota de mercado · activa desde '+d.promoNote.from});
    }
  });
  alerts = promoNotes.concat(alerts);

  document.getElementById('alertas').innerHTML=alerts.map(function(a){
    return '<div class="al-item"><div class="adot '+a.t+'"></div><div><div class="atxt">'+a.msg+'</div><div class="ameta">'+a.meta+'</div></div></div>';
  }).join('');

  document.getElementById('footer').textContent=
    cfg.label+' · Canal '+cLabel+' · Ventana '+WIN[0]+'-'+focusWeek+' (histórico completo W14-W30 disponible) · '+
    new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

/* ══ TABLA HISTÓRICA COMPLETA W14-W26 ══ */
function openChart() {
  var cfg = CFG[apl];
  var clients = cfg.data[canal];
  var cliList = Object.keys(clients);
  var names = canal==='PYP'?NAMES_PYP:NAMES_HYS;
  var cLabel = canal==='PYP'?'P&P':'H&S';
  var tot = cfg.totales[canal];
  var marcas = cfg.marcas;
  var ixRowsCfg = cfg.ixRows;

  document.getElementById('modal-title').textContent =
    'Histórico completo W14 — W30 · '+cfg.label+' · '+cLabel;

  var thead='<thead><tr>'+
    '<th class="lh" rowspan="2">Cliente</th>'+
    '<th class="lhm" rowspan="2">Marca / Producto</th>'+
    '<th class="lhp" rowspan="2">P.Sug.</th>';
  WEEKS_ALL.forEach(function(s){
    thead+='<th colspan="3">'+s+'</th>';
  });
  thead+='</tr><tr>';
  WEEKS_ALL.forEach(function(){
    thead+='<th style="min-width:64px">P.Unit</th><th style="min-width:64px">P.Promo</th><th style="min-width:38px">IX</th>';
  });
  thead+='</tr></thead>';

  var tbody='<tbody>';
  cliList.forEach(function(cli, ci){
    var d=clients[cli];
    var totalRows=marcas.length+ixRowsCfg.length;
    var sepCls=ci>0?'grp-sep':'';

    marcas.forEach(function(m, mi){
      var isN=m.isN;
      var row='<tr'+(mi===0&&sepCls?' class="'+sepCls+'"':'')+'>';
      if(mi===0){
        row+='<td class="cli" rowspan="'+totalRows+'">'+(names[cli]||cli)+'</td>';
      }
      row+='<td class="mrc"><div class="br"><div class="bd" style="background:'+m.col+'"></div>'+(isN?'<strong>'+m.lbl+'</strong>':m.lbl)+'</div></td>';
      var psVal = null;
      if (m.key==='NIV') psVal = d.ps;
      else if (m.key==='NIV2' && d.psMap) psVal = d.psMap.NIV2;
      var psContent = psVal ? '<span class="ps-val">'+psVal+'</span>' : '<span style="color:#ddd">—</span>';
      row+='<td class="psug">'+psContent+'</td>';
      WEEKS_ALL.forEach(function(s,si){
        var entry=d[m.key]?d[m.key][s]:null;
        var prevEntry=si>0&&d[m.key]?d[m.key][WEEKS_ALL[si-1]]:null;
        var pu=entry?entry.pu:null;
        var pp=entry?entry.pp:null;
        var prevPP=prevEntry?prevEntry.pp:undefined;
        row+='<td>'+puCell(pu)+'</td>';
        row+='<td>'+ppCell(pp,isN,prevPP,isPromoActiveAt(d,s))+'</td>';
        row+='<td></td>';
      });
      row+='</tr>';
      tbody+=row;
    });

    ixRowsCfg.forEach(function(ix){
      var row='<tr>';
      row+='<td class="mrc" style="padding-left:14px;color:'+ix.col+';font-size:9px;font-style:italic">'+ix.lbl+'</td>';
      row+='<td class="psug"></td>';
      WEEKS_ALL.forEach(function(s){
        var ixKey = ix.key+'_IX';
        var ixVal = d[ixKey] ? d[ixKey][s] : null;
        row+='<td></td><td></td><td>'+ixPill(ixVal)+'</td>';
      });
      row+='</tr>';
      tbody+=row;
    });
  });

  cfg.totKeys.forEach(function(tk, ti){
    var cls=ti===0?'tot-row grp-sep':'tot-row';
    var row='<tr class="'+cls+'">'+
      '<td class="cli" style="color:'+cfg.totCol[tk]+';font-weight:700;font-size:10px" colspan="2">'+cfg.totLbls[tk]+'</td>'+
      '<td class="psug"></td>';
    WEEKS_ALL.forEach(function(s){
      var v=tot[tk]?tot[tk][s]:null;
      row+='<td></td><td></td><td>'+ixPill(v)+'</td>';
    });
    row+='</tr>';
    tbody+=row;
  });

  tbody+='</tbody>';
  document.getElementById('tbl-hist').innerHTML = thead+tbody;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeChart(){ document.getElementById('modal-overlay').classList.remove('open'); }

render();
</script>
