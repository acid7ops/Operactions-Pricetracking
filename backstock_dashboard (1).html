<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backstock Tracker — Nivea Chile — Semana 3 Julio 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --nivea:#0057A8; --nivea-deep:#00294F; --nivea-mid:#0A3D73; --nivea-light:#E6F1FB;
  --ink:#0B1C2C; --muted:#5B6B7C; --faint:#8698A8;
  --paper:#FFFFFF; --canvas:#EEF3F9; --line:#DCE6F0; --mist:#E7EFF8;
  --green:#158A4A; --green-bg:#EAF3DE;
  --back:#B8620A; --back-bg:#FFF3E0;
  --face:#0057A8; --face-bg:#E6F1FB;
  --deo:#7A1F3D; --deo-bg:#F7E6EC;
  --body-c:#158A4A; --body-bg:#EAF3DE;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
  --sh-sm:0 1px 3px rgba(10,27,46,.07);
  --sh-md:0 4px 16px rgba(10,27,46,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{
  font-family:'Inter',sans-serif;
  background:var(--canvas);
  color:var(--ink);
  font-size:12px;
  overflow-x:hidden;
  max-width:100vw;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}

.topbar{
  background:linear-gradient(135deg, var(--nivea-deep) 0%, var(--nivea-mid) 100%);
  padding:.6rem 1.4rem;
  display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 20px rgba(10,27,46,.18);
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--nivea-mid),var(--back),var(--nivea-mid));
}
.tb-brand{
  color:white;font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:-.01em;
  padding-right:1.1rem;border-right:1px solid rgba(255,255,255,.18);
  white-space:nowrap;display:flex;flex-direction:column;gap:1px;
}
.tb-brand::before{
  content:'H&S BACKSTOCK TRACKER'; font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;letter-spacing:.14em;color:#A9CDEF;font-weight:500;
}
.tb-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.wbadge{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
  padding:3px 10px;border-radius:20px;letter-spacing:.04em;
  background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);
  white-space:nowrap;
}
.btn{
  font-family:'Inter',sans-serif;font-size:11px;padding:5px 13px;border-radius:var(--r-sm);
  border:none;cursor:pointer;font-weight:600;
  background:rgba(255,255,255,.15);color:white;transition:background .15s;letter-spacing:.01em;
}
.btn:hover{background:rgba(255,255,255,.28)}

.searchbar{
  background:var(--paper);border-bottom:1px solid var(--line);
  padding:.55rem 1.4rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  position:sticky;top:42px;z-index:199;box-shadow:var(--sh-sm);
}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%}
.filter-tag{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-right:2px;white-space:nowrap}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:360px}
.search-input{
  width:100%;font-family:'IBM Plex Mono',monospace;font-size:11.5px;
  padding:7px 12px;border:1px solid var(--line);border-radius:20px;
  outline:none;color:var(--ink);background:var(--canvas);
  transition:border-color .15s,background .15s;
}
.search-input:focus{border-color:var(--nivea);background:white}
.search-drop{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:white;border:1px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--sh-md);max-height:320px;overflow-y:auto;z-index:250;display:none;
}
.search-drop.show{display:block}
.search-item{
  padding:7px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  border-bottom:.5px solid var(--mist);font-size:11px;
}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--nivea-light)}
.si-code{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--nivea-deep)}
.si-sub{font-size:9.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace}
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.cbtn{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
  padding:4px 14px;border-radius:20px;border:1px solid var(--line);
  background:transparent;cursor:pointer;color:var(--muted);
  transition:all .15s;letter-spacing:.03em;white-space:nowrap;
}
.cbtn:hover{border-color:var(--nivea);color:var(--nivea)}
.cbtn.active{background:var(--nivea-deep);color:white;border-color:var(--nivea-deep)}

.page{max-width:1200px;margin:.9rem auto;padding:0 1.2rem}
.info-banner{
  background:var(--nivea-light);border:1px solid var(--nivea);border-radius:var(--r-md);
  padding:.55rem .9rem;margin-bottom:.75rem;font-size:10.5px;color:var(--nivea-deep);
  display:flex;gap:8px;align-items:flex-start;
}
.info-banner b{font-weight:700}
.ph{
  background:white;border-radius:var(--r-lg);padding:.8rem 1.2rem;margin-bottom:.75rem;
  border-left:4px solid var(--back);display:flex;justify-content:space-between;align-items:flex-start;
  flex-wrap:wrap;gap:8px;box-shadow:var(--sh-sm);
}
.ph-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;letter-spacing:-.01em}
.ph-sub{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--faint);margin-top:3px;letter-spacing:.04em}
.ph-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{
  font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;
  padding:3px 9px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;
}
.b-blue{background:var(--nivea-light);color:var(--nivea)}
.b-dark{background:var(--nivea-deep);color:white}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--back-bg);color:var(--back)}
.b-bad{background:#FCEBEB;color:#C0392B}
.nav-btn{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
  padding:4px 11px;border-radius:20px;border:1px solid var(--line);
  background:white;color:var(--muted);cursor:pointer;transition:all .15s;
}
.nav-btn:hover{border-color:var(--nivea);color:var(--nivea)}
.nav-btn:disabled{opacity:.4;cursor:default}
.nav-btn:disabled:hover{border-color:var(--line);color:var(--muted)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.75rem}
.kpi{
  background:white;border-radius:var(--r-md);padding:.7rem .9rem;
  border:1px solid var(--line);border-left:3px solid var(--line);
  box-shadow:var(--sh-sm);transition:box-shadow .15s,transform .15s;
}
.kpi:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.kpi-lbl{
  font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--faint);margin-bottom:4px;
}
.kpi-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.01em}
.kpi-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--faint);margin-top:2px;letter-spacing:.03em}

.main{display:grid;grid-template-columns:1fr 280px;gap:.75rem;margin-bottom:.75rem}
.left-col{display:flex;flex-direction:column;gap:.75rem}
.rcol{display:flex;flex-direction:column;gap:.75rem}
.card{
  background:white;border-radius:var(--r-lg);padding:.85rem 1.1rem;
  border:1px solid var(--line);box-shadow:var(--sh-sm);
}
.sec-lbl{
  font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:var(--faint);margin-bottom:.6rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
}

.toggle-pill{display:flex;background:var(--canvas);border-radius:20px;padding:3px;border:1px solid var(--line)}
.toggle-opt{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:5px 14px;
  border-radius:18px;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:none;
}
.toggle-opt.active{background:var(--nivea-deep);color:white}

.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.cat-tab{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
  padding:6px 16px;border-radius:20px;border:1px solid var(--line);
  background:white;cursor:pointer;color:var(--muted);transition:all .15s;letter-spacing:.02em;
}
.cat-tab:hover{border-color:var(--nivea);color:var(--nivea)}
.cat-tab.active{background:var(--nivea-deep);color:white;border-color:var(--nivea-deep)}

.gapbar{display:flex;height:22px;border-radius:6px;overflow:hidden;margin-bottom:6px;box-shadow:inset 0 0 0 1px var(--line)}
.gapbar-seg{display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;
  font-family:'IBM Plex Mono',monospace;color:white;white-space:nowrap;overflow:hidden;min-width:0}
.gap-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:9.5px;color:var(--muted);margin-bottom:4px}
.gap-legend span{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.gl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

table.pt{width:100%;border-collapse:collapse;font-size:11px}
table.pt th{
  font-family:'IBM Plex Mono',monospace;font-size:7.5px;font-weight:600;color:var(--faint);
  padding:5px 8px;border-bottom:1px solid var(--line);text-align:left;background:var(--canvas);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;
}
table.pt td{padding:6px 8px;border-bottom:.5px solid var(--mist);vertical-align:middle}
table.pt tr:last-child td{border-bottom:none}
table.pt tr:hover td{background:var(--mist)}
.prod-name{font-size:10.5px;line-height:1.35}
.ean-code{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted)}
.cat-pill{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;
  padding:2px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.02em;
}
.chain-pill{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;
  padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.02em;
  background:var(--nivea-light);color:var(--nivea-deep);
}
.store-link{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--nivea-deep);cursor:pointer}
.store-link:hover{text-decoration:underline}

.rank-row{
  display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:.5px solid var(--mist);
  cursor:pointer;transition:background .1s;
}
.rank-row:hover{background:var(--mist)}
.rank-row:last-child{border-bottom:none}
.rank-pos{
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--faint);
  width:16px;text-align:center;flex-shrink:0;
}
.rank-code{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11.5px;color:var(--nivea-deep);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-sub{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--faint);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-bar-wrap{flex:1;background:var(--mist);border-radius:20px;height:7px;overflow:hidden}
.rank-bar{height:100%;border-radius:20px;background:var(--back)}
.rank-val{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;width:44px;text-align:right;flex-shrink:0}

.hero{
  background:white;border-radius:var(--r-lg);padding:1.4rem 1.4rem 1.1rem;margin-bottom:.75rem;
  border:1px solid var(--line);box-shadow:var(--sh-sm);text-align:center;
}
.hero-title{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:.3rem}
.hero-sub{font-size:11.5px;color:var(--muted);max-width:580px;margin:0 auto .9rem}

.empty-hint{text-align:center;padding:2rem 1rem;color:var(--faint);font-size:11.5px}

.footer{
  text-align:center;padding:.7rem;font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;color:var(--faint);margin-top:.3rem;letter-spacing:.04em;
}
@media print{
  .topbar,.searchbar{display:none}
  .page{padding:0;margin:0;max-width:100%}
}
@media(max-width:860px){
  .main{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .rank-code{width:80px}
  .rank-sub{width:70px}
}
</style>
</head>

var CHAINS = ['FASA','Cruz Verde','Preunic','Salcobrand','Maicao'];
var CATS = ['Face','Deo','Body'];
var CAT_LABELS = {Face:'Face', Deo:'Desodorante', Body:'Body'};
var CAT_STYLE = {
  Face: {color:'var(--face)', bg:'var(--face-bg)'},
  Deo:  {color:'var(--deo)',  bg:'var(--deo-bg)'},
  Body: {color:'var(--body-c)', bg:'var(--body-bg)'}
};

var curView = 'home';
var homeMode = 'sup';
var detailType = null;
var detailKey = null;
var curCat = 'General';
var curCatFilter = 'ALL';
var curChainFilter = 'ALL';

function esc(s){ return (s==null? '' : String(s)); }

function filteredRecords(){
  return RECORDS.filter(function(r){
    return (curCatFilter === 'ALL' || r.cat === curCatFilter) &&
           (curChainFilter === 'ALL' || r.chain === curChainFilter);
  });
}

function groupBy(recs, keyFn){
  var m = {};
  recs.forEach(function(r){
    var k = keyFn(r);
    if (!m[k]) m[k] = [];
    m[k].push(r);
  });
  return m;
}

function supList(){
  var s = {}; RECORDS.forEach(function(r){ s[r.sup] = true; }); return Object.keys(s).sort();
}
function storeList(){
  var s = {}; RECORDS.forEach(function(r){ s[r.store] = true; }); return Object.keys(s).sort();
}
function storeSupervisor(store){
  var r = RECORDS.find(function(x){ return x.store === store; });
  return r ? r.sup : null;
}
function storeChain(store){
  var r = RECORDS.find(function(x){ return x.store === store; });
  return r ? r.chain : null;
}
function supervisorStores(sup){
  var s = {}; RECORDS.forEach(function(r){ if (r.sup === sup) s[r.store] = true; }); return Object.keys(s).sort();
}
function supervisorChains(sup){
  var s = {}; RECORDS.forEach(function(r){ if (r.sup === sup) s[r.chain] = true; }); return Object.keys(s).sort();
}
function supervisorPeriods(sup){
  var s = {}; RECORDS.forEach(function(r){ if (r.sup === sup) s[r.period] = true; }); return Object.keys(s).sort();
}
function catBreakdown(recs){
  var out = {Face:0, Deo:0, Body:0};
  recs.forEach(function(r){ out[r.cat] = (out[r.cat]||0) + 1; });
  return out;
}

function renderChainFilters(){
  var html = '<button class="cbtn' + (curChainFilter==='ALL'?' active':'') + '" onclick="setChainFilter(\'ALL\')">Todas</button>';
  CHAINS.forEach(function(c){
    html += '<button class="cbtn' + (curChainFilter===c?' active':'') + '" onclick="setChainFilter(\'' + c + '\')">' + c + '</button>';
  });
  document.getElementById('chain-filters').innerHTML = html;
}
function setChainFilter(c){
  curChainFilter = c;
  renderChainFilters();
  if (curView === 'home') renderHome(); else renderDetail();
}
function renderCatFilters(){
  var html = '<button class="cbtn' + (curCatFilter==='ALL'?' active':'') + '" onclick="setCatFilter(\'ALL\')">Todas</button>';
  CATS.forEach(function(c){
    html += '<button class="cbtn' + (curCatFilter===c?' active':'') + '" onclick="setCatFilter(\'' + c + '\')">' + CAT_LABELS[c] + '</button>';
  });
  document.getElementById('cat-filters').innerHTML = html;
}
function setCatFilter(c){
  curCatFilter = c;
  renderCatFilters();
  if (curView === 'home') renderHome(); else renderDetail();
}

function onSearchInput(){
  var q = document.getElementById('search-input').value.trim().toUpperCase();
  var drop = document.getElementById('search-drop');
  if (!q){ drop.classList.remove('show'); drop.innerHTML=''; return; }

  var supMatches = supList().filter(function(s){ return s.toUpperCase().indexOf(q) >= 0; }).slice(0,6);
  var storeMatches = storeList().filter(function(s){ return s.toUpperCase().indexOf(q) >= 0; }).slice(0,6);

  var html = '';
  supMatches.forEach(function(s){
    var n = RECORDS.filter(function(r){ return r.sup === s; }).length;
    html += '<div class="search-item" onclick="goDetail(\'sup\',\'' + s.replace(/'/g,"\\'") + '\')">' +
      '<span class="si-code">' + s + '</span><span class="si-sub">Supervisor &middot; ' + n + ' casos</span></div>';
  });
  storeMatches.forEach(function(s){
    var n = RECORDS.filter(function(r){ return r.store === s; }).length;
    html += '<div class="search-item" onclick="goDetail(\'store\',\'' + s + '\')">' +
      '<span class="si-code">' + s + '</span><span class="si-sub">' + storeChain(s) + ' &middot; ' + n + ' casos</span></div>';
  });
  if (!html){ drop.classList.remove('show'); drop.innerHTML=''; return; }
  drop.innerHTML = html;
  drop.classList.add('show');
}
document.addEventListener('click', function(e){
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('search-drop').classList.remove('show');
  }
});

function goDetail(type, key){
  detailType = type;
  detailKey = key;
  curCat = 'General';
  curView = 'detail';
  document.getElementById('search-input').value = '';
  document.getElementById('search-drop').classList.remove('show');
  renderDetail();
}
function goHome(){
  curView = 'home';
  renderHome();
}
function setHomeMode(m){
  homeMode = m;
  renderHome();
}

function renderHome(){
  var recs = filteredRecords();
  var totalCases = recs.length;
  var nSup = Object.keys(groupBy(recs, function(r){return r.sup;})).length;
  var nStore = Object.keys(groupBy(recs, function(r){return r.store;})).length;
  var eanSet = {};
  recs.forEach(function(r){ eanSet[r.ean || ('NAME::'+r.prod)] = true; });
  var nSku = Object.keys(eanSet).length;

  var periods = {};
  recs.forEach(function(r){ periods[r.period] = true; });
  var periodList = Object.keys(periods);

  var kpisHtml =
    '<div class="kpi" style="border-left-color:var(--back)"><div class="kpi-lbl">Casos de Backstock</div>' +
      '<div class="kpi-val" style="color:var(--back)">' + totalCases + '</div><div class="kpi-sub">Stock en sistema, sin foto</div></div>' +
    '<div class="kpi" style="border-left-color:var(--nivea)"><div class="kpi-lbl">Supervisores afectados</div>' +
      '<div class="kpi-val">' + nSup + '</div><div class="kpi-sub">de ' + supList().length + ' totales</div></div>' +
    '<div class="kpi" style="border-left-color:var(--nivea)"><div class="kpi-lbl">Locales afectados</div>' +
      '<div class="kpi-val">' + nStore + '</div><div class="kpi-sub">de ' + storeList().length + ' totales</div></div>' +
    '<div class="kpi" style="border-left-color:var(--green)"><div class="kpi-lbl">SKU únicos</div>' +
      '<div class="kpi-val">' + nSku + '</div><div class="kpi-sub">productos distintos en backstock</div></div>';

  var rankGroups = groupBy(recs, function(r){ return homeMode === 'sup' ? r.sup : r.store; });
  var ranked = Object.keys(rankGroups).map(function(k){
    var g = rankGroups[k];
    var sub;
    if (homeMode==='sup'){
      var chains = supervisorChains(k);
      sub = supervisorStores(k).length + ' locales';
    } else {
      sub = storeChain(k);
    }
    return {key:k, count:g.length, sub: sub};
  }).sort(function(a,b){ return b.count - a.count; }).slice(0,14);
  var maxCount = ranked.length ? ranked[0].count : 1;

  var rankHtml = ranked.map(function(r, i){
    var w = Math.round(r.count/maxCount*100);
    return '<div class="rank-row" onclick="goDetail(\'' + homeMode + '\',\'' + r.key.replace(/'/g,"\\'") + '\')">' +
      '<div class="rank-pos">' + (i+1) + '</div>' +
      '<div class="rank-code" title="' + r.key + '">' + r.key + '</div>' +
      '<div class="rank-sub" title="' + r.sub + '">' + r.sub + '</div>' +
      '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + w + '%"></div></div>' +
      '<div class="rank-val" style="color:var(--back)">' + r.count + '</div></div>';
  }).join('');

  var catBk = catBreakdown(recs);
  var catCardsHtml = CATS.map(function(c){
    var n = catBk[c] || 0;
    var pctv = totalCases ? Math.round(n/totalCases*100) : 0;
    var st = CAT_STYLE[c];
    return '<div class="kpi" style="border-left-color:' + st.color + ';cursor:pointer" onclick="setCatFilter(\'' + c + '\')">' +
      '<div class="kpi-lbl">' + CAT_LABELS[c] + '</div>' +
      '<div class="kpi-val" style="font-size:18px;color:' + st.color + '">' + n + '</div>' +
      '<div class="kpi-sub">' + pctv + '% del total</div></div>';
  }).join('');

  var chainCardsHtml = CHAINS.map(function(c){
    var n = recs.filter(function(r){ return r.chain === c; }).length;
    var pd = {};
    recs.filter(function(r){ return r.chain === c; }).forEach(function(r){ pd[r.period]=true; });
    var pdLabel = Object.keys(pd)[0] || '—';
    return '<div class="kpi" style="border-left-color:var(--nivea);cursor:pointer" onclick="setChainFilter(\'' + c + '\')">' +
      '<div class="kpi-lbl">' + c + '</div>' +
      '<div class="kpi-val" style="font-size:18px">' + n + '</div>' +
      '<div class="kpi-sub">' + pdLabel + '</div></div>';
  }).join('');

  var prodGroups = groupBy(recs, function(r){ return r.ean || ('NAME::'+r.prod); });
  var topProds = Object.keys(prodGroups).map(function(k){
    var g = prodGroups[k];
    var stores = {};
    g.forEach(function(r){ stores[r.store] = true; });
    return {name:g[0].prod, cat:g[0].cat, ean:g[0].ean, count:g.length, nStores: Object.keys(stores).length};
  }).sort(function(a,b){ return b.count - a.count; }).slice(0,8);

  var topProdRows = topProds.map(function(p){
    var st = CAT_STYLE[p.cat];
    return '<tr><td class="prod-name">' + p.name + '<br><span class="ean-code">' + (p.ean || 'Sin EAN') + '</span></td>' +
      '<td><span class="cat-pill" style="background:' + st.bg + ';color:' + st.color + '">' + CAT_LABELS[p.cat] + '</span></td>' +
      '<td style="text-align:center;font-weight:700;color:var(--back)">' + p.count + '</td>' +
      '<td style="text-align:center;color:var(--muted)">' + p.nStores + '</td></tr>';
  }).join('');

  var toggleHtml =
    '<div class="toggle-pill">' +
      '<button class="toggle-opt' + (homeMode==='sup'?' active':'') + '" onclick="setHomeMode(\'sup\')">Por Supervisor</button>' +
      '<button class="toggle-opt' + (homeMode==='store'?' active':'') + '" onclick="setHomeMode(\'store\')">Por Local</button>' +
    '</div>';


  document.getElementById('page').innerHTML =
    '<div class="hero">' +
      '<div class="hero-title">Backstock Tracker &mdash; Nivea Chile</div>' +
      '<div class="hero-sub">Producto con stock en sistema pero ausente en la foto de góndola. Prioriza los supervisores y locales con más casos para accionar en terreno esta semana.</div>' +
    '</div>' +
    '<div class="kpis">' + kpisHtml + '</div>' +
    '<div class="main">' +
      '<div class="left-col">' +
        '<div class="card">' +
          '<div class="sec-lbl"><span>Ranking de mayor oportunidad</span>' + toggleHtml + '</div>' +
          (rankHtml || '<div class="empty-hint">Sin casos para este filtro.</div>') +
        '</div>' +
      '</div>' +
      '<div class="rcol">' +
        '<div class="card"><div class="sec-lbl">Casos por cadena</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px">' + chainCardsHtml + '</div>' +
        '</div>' +
        '<div class="card"><div class="sec-lbl">Casos por categoría</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px">' + catCardsHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="sec-lbl">Productos recurrentes &middot; mismo SKU en múltiples locales</div>' +
      '<table class="pt"><thead><tr><th>Producto</th><th style="width:110px">Categoría</th><th style="width:70px;text-align:center">Casos</th><th style="width:80px;text-align:center">Locales</th></tr></thead>' +
      '<tbody>' + topProdRows + '</tbody></table>' +
    '</div>';

  document.getElementById('footer').textContent =
    'Backstock Tracker · Nivea Chile · ' + totalCases + ' casos · ' +
    new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function catMixBar(recs){
  var bk = catBreakdown(recs);
  var total = recs.length || 1;
  var html = '<div class="gapbar">';
  CATS.forEach(function(c){
    var v = (bk[c]||0) / total;
    if (v <= 0) return;
    var w = Math.round(v*1000)/10;
    var st = CAT_STYLE[c];
    html += '<div class="gapbar-seg" style="width:' + w + '%;background:' + st.color + '" title="' + CAT_LABELS[c] + ': ' + (bk[c]||0) + '">' + (w>=8 ? (bk[c]||0) : '') + '</div>';
  });
  html += '</div>';
  return html;
}
function catMixLegend(){
  return '<div class="gap-legend">' + CATS.map(function(c){
    return '<span><span class="gl-dot" style="background:' + CAT_STYLE[c].color + '"></span>' + CAT_LABELS[c] + '</span>';
  }).join('') + '</div>';
}

function renderDetail(){
  var isSup = detailType === 'sup';
  var allRecsForKey = RECORDS.filter(function(r){ return isSup ? r.sup === detailKey : r.store === detailKey; });
  var recs = curCat === 'General' ? allRecsForKey : allRecsForKey.filter(function(r){ return r.cat === curCat; });
  if (curChainFilter !== 'ALL'){
    allRecsForKey = allRecsForKey.filter(function(r){ return r.chain === curChainFilter; });
    recs = recs.filter(function(r){ return r.chain === curChainFilter; });
  }

  var relatedStores = isSup ? supervisorStores(detailKey) : [detailKey];
  var relatedChains = isSup ? supervisorChains(detailKey) : [storeChain(detailKey)];
  var periods = isSup ? supervisorPeriods(detailKey) : Object.keys(groupBy(RECORDS.filter(function(r){return r.store===detailKey;}), function(r){return r.period;}));

  var badges = '<span class="badge b-dark">' + (isSup ? 'Supervisor' : 'Local') + '</span>' +
    '<span class="badge b-warn">' + allRecsForKey.length + ' casos backstock</span>' +
    relatedChains.map(function(c){ return '<span class="badge b-blue">' + c + '</span>'; }).join('') +
    periods.map(function(p){ return '<span class="badge b-ok">' + p + '</span>'; }).join('');

  var navList = isSup ? supList() : storeList();
  var idx = navList.indexOf(detailKey);

  document.getElementById('page').innerHTML =
    '<div class="ph">' +
      '<div><div class="ph-title">' + detailKey + '</div><div class="ph-sub">' + (isSup ? ('Supervisor · ' + relatedStores.length + ' locales a cargo · ' + relatedChains.join(', ')) : ('Local · ' + storeChain(detailKey) + ' · Supervisor: ' + storeSupervisor(detailKey))) + '</div></div>' +
      '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">' +
        '<div class="ph-badges">' + badges + '</div>' +
        '<div style="display:flex;gap:5px">' +
          '<button class="nav-btn" onclick="goHome()">&larr; Inicio</button>' +
          '<button class="nav-btn" onclick="stepDetail(-1)"' + (idx<=0?' disabled':'') + '>&larr; Anterior</button>' +
          '<button class="nav-btn" onclick="stepDetail(1)"' + (idx>=navList.length-1?' disabled':'') + '>Siguiente &rarr;</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="kpis" id="kpis"></div>' +
    '<div class="cat-tabs" id="cat-tabs"></div>' +
    '<div id="cat-body"></div>' +
    '<div class="footer">Backstock Tracker · ' + detailKey + '</div>';

  window._navList = navList;

  renderDetailKpis(allRecsForKey, relatedStores);
  renderDetailCatTabs();
  renderDetailBody(recs, allRecsForKey);
}

function stepDetail(dir){
  var list = window._navList;
  var idx = list.indexOf(detailKey) + dir;
  if (idx < 0 || idx >= list.length) return;
  goDetail(detailType, list[idx]);
}

function renderDetailKpis(allRecs, stores){
  var bk = catBreakdown(allRecs);
  var kpis = [
    {lbl:'Total Backstock', val: allRecs.length, c:'var(--back)'},
    {lbl:'Locales', val: stores.length, c:'var(--nivea)'},
    {lbl:'Face', val: bk.Face||0, c: CAT_STYLE.Face.color},
    {lbl:'Deo', val: bk.Deo||0, c: CAT_STYLE.Deo.color},
    {lbl:'Body', val: bk.Body||0, c: CAT_STYLE.Body.color},
  ];
  document.getElementById('kpis').innerHTML = kpis.map(function(k){
    return '<div class="kpi" style="border-left-color:' + k.c + '"><div class="kpi-lbl">' + k.lbl + '</div>' +
      '<div class="kpi-val" style="color:' + k.c + '">' + k.val + '</div></div>';
  }).join('');
}

function renderDetailCatTabs(){
  var tabs = ['General'].concat(CATS);
  document.getElementById('cat-tabs').innerHTML = tabs.map(function(t){
    var lbl = t === 'General' ? 'General' : CAT_LABELS[t];
    return '<button class="cat-tab' + (curCat===t?' active':'') + '" onclick="setDetailCat(\'' + t + '\')">' + lbl + '</button>';
  }).join('');
}
function setDetailCat(c){
  curCat = c;
  renderDetailCatTabs();
  renderDetail();
}

function productTableHtml(recs, isSup){
  if (!recs.length) return '<div class="empty-hint">Sin productos en backstock para este filtro.</div>';
  var sorted = recs.slice().sort(function(a,b){
    if (a.store !== b.store) return a.store < b.store ? -1 : 1;
    return a.prod < b.prod ? -1 : 1;
  });
  var rows = sorted.map(function(r){
    var st = CAT_STYLE[r.cat];
    var storeCell = isSup
      ? '<span class="store-link" onclick="goDetail(\'store\',\'' + r.store + '\')">' + r.store + '</span>'
      : r.store;
    return '<tr><td class="prod-name">' + r.prod + '</td>' +
      '<td class="ean-code">' + (r.ean || '—') + '</td>' +
      '<td><span class="cat-pill" style="background:' + st.bg + ';color:' + st.color + '">' + CAT_LABELS[r.cat] + '</span></td>' +
      (isSup ? '<td><span class="chain-pill">' + r.chain + '</span></td>' : '') +
      '<td>' + storeCell + '</td></tr>';
  }).join('');
  var chainHeader = isSup ? '<th style="width:80px">Cadena</th>' : '';
  return '<table class="pt"><thead><tr><th>Producto</th><th style="width:110px">EAN</th><th style="width:100px">Categoría</th>' + chainHeader + '<th style="width:80px">Local</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function renderDetailBody(recs, allRecsForKey){
  var isSup = detailType === 'sup';
  var body = document.getElementById('cat-body');

  var storesBlock = '';
  if (isSup){
    var stores = supervisorStores(detailKey);
    if (curChainFilter !== 'ALL') stores = stores.filter(function(s){ return storeChain(s) === curChainFilter; });
    storesBlock = '<div class="card" style="margin-bottom:.75rem">' +
      '<div class="sec-lbl">Locales a cargo</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
      stores.map(function(s){
        var n = allRecsForKey.filter(function(r){ return r.store===s; }).length;
        return '<span class="cbtn" style="cursor:pointer" onclick="goDetail(\'store\',\'' + s + '\')">' + s + ' (' + storeChain(s) + ') &middot; ' + n + '</span>';
      }).join('') +
      '</div></div>';
  }

  body.innerHTML =
    storesBlock +
    '<div class="card" style="margin-bottom:.75rem">' +
      '<div class="sec-lbl">Distribución por categoría</div>' +
      catMixBar(allRecsForKey) + catMixLegend() +
    '</div>' +
    '<div class="card">' +
      '<div class="sec-lbl"><span>Detalle de productos en backstock &middot; ' + recs.length + ' de ' + allRecsForKey.length + '</span></div>' +
      productTableHtml(recs, isSup) +
    '</div>';
}

renderChainFilters();
renderCatFilters();
renderHome();
</script>
</body>
</html>
