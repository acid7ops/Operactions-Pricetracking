<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Gerencial — Plan Backstock Derma</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A1F3D; --panel:#FFFFFF; --line:#D7E1EC;
    --teal:#0057A8; --teal-dark:#002D6B;
    --green:#1F8A4C; --amber:#E0A62B; --red:#C63C2C; --gray:#9C9488;
    --bg:#EAF1F8;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--ink); }
  .app{ display:flex; flex-direction:column; height:100vh; min-height:680px; }

  .topbar{
    background:var(--teal-dark); color:#fff; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .topbar .title{ display:flex; flex-direction:column; }
  .topbar .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#9CC3EA; }
  .topbar h1{ font-family:'Space Grotesk',sans-serif; font-size:19px; margin:2px 0 0 0; }
  .breadcrumb{ display:flex; align-items:center; gap:6px; font-size:13px; flex-wrap:wrap; }
  .crumb{ cursor:pointer; padding:5px 10px; border-radius:6px; background:rgba(255,255,255,0.08); }
  .crumb:hover{ background:rgba(255,255,255,0.18); }
  .crumb.active{ background:#fff; color:var(--teal-dark); font-weight:600; }
  .sep{ opacity:.5; }

  .controlbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:10px 24px; background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap;
  }
  .month-tabs{ display:flex; gap:6px; }
  .mbtn{
    padding:7px 14px; border:1px solid var(--line); background:#fff; border-radius:20px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; color:var(--ink); display:flex; align-items:center; gap:6px;
  }
  .mbtn.active{ background:var(--teal-dark); color:#fff; border-color:var(--teal-dark); }
  .mbtn .tag{ font-size:9px; padding:1px 5px; border-radius:8px; background:rgba(0,0,0,.08); }
  .mbtn.active .tag{ background:rgba(255,255,255,.2); }
  .metric-toggle{ display:flex; gap:6px; }
  .mtbtn{
    padding:7px 14px; border:1px solid var(--line); background:#fff; border-radius:7px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; color:var(--ink);
  }
  .mtbtn.active{ background:var(--teal); color:#fff; border-color:var(--teal); }
  .sku-filter select{
    padding:7px 10px; border:1px solid var(--line); border-radius:7px; background:#fff;
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink); max-width:280px;
  }
  .sku-filter select:disabled{ opacity:.45; cursor:not-allowed; }

  .kpirow{ display:flex; gap:12px; padding:14px 24px; background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .kpi{ flex:1; min-width:140px; border:1px solid var(--line); border-radius:10px; padding:10px 14px; }
  .kpi .label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; color:#6B6459; }
  .kpi .value{ font-family:'Space Grotesk',sans-serif; font-size:24px; margin-top:2px; }
  .kpi .value.red{ color:var(--red); } .kpi .value.green{ color:var(--green); } .kpi .value.amber{ color:var(--amber); }

  .body{ flex:1; display:grid; grid-template-columns: 1fr 460px; min-height:0; }
  .map-col{ position:relative; }
  #map{ height:100%; width:100%; }
  .legend{
    position:absolute; bottom:16px; left:16px; z-index:500; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; padding:10px 14px; font-size:12px; color:#6B6459;
    box-shadow:0 2px 10px rgba(19,42,46,0.1);
  }
  .legend div{ display:flex; align-items:center; gap:8px; margin:3px 0; }
  .legend .sw{ width:10px; height:10px; border-radius:50%; }

  .side{ background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; display:flex; flex-direction:column; }
  .side-header{ padding:14px 18px; border-bottom:1px solid var(--line); }
  .side-header h2{ font-family:'Space Grotesk',sans-serif; font-size:15px; margin:0 0 4px 0; }
  .side-header p{ margin:0; font-size:12px; color:#6B6459; }

  .plan-general{ padding:12px 18px; border-bottom:1px solid var(--line); }
  .plan-general h3{ font-family:'Space Grotesk',sans-serif; font-size:13px; margin:0 0 8px 0; }
  table.pg{ width:100%; border-collapse:collapse; font-size:11.5px; }
  table.pg th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; color:#6B6459; padding:4px 3px; border-bottom:1px solid var(--line); }
  table.pg td{ padding:5px 3px; border-bottom:1px solid #ECE8DD; }
  table.pg td.num{ font-family:'IBM Plex Mono',monospace; font-weight:600; text-align:right; }
  .region-block{ padding:12px 18px; border-bottom:1px solid var(--line); }
  .region-block h3{ font-family:'Space Grotesk',sans-serif; font-size:13px; margin:0 0 8px 0; }
  table.region{ width:100%; border-collapse:collapse; font-size:12px; }
  table.region th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; color:#6B6459; padding:4px 3px; border-bottom:1px solid var(--line); }
  table.region td{ padding:5px 3px; border-bottom:1px solid #ECE8DD; }
  table.region td.num{ font-family:'IBM Plex Mono',monospace; font-weight:600; text-align:right; }
  table.region tr.worst td{ background:#FBEDEA; }

  .cards{ padding:12px 18px; display:flex; flex-direction:column; gap:8px; }
  .card{
    border:1px solid var(--line); border-radius:10px; padding:11px 13px; cursor:pointer; background:#fff;
    transition:box-shadow .15s, border-color .15s;
  }
  .card:hover{ box-shadow:0 2px 8px rgba(19,42,46,0.12); border-color:var(--teal); }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .card-name{ font-weight:600; font-size:13.5px; }
  .card-msl{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; }
  .card-sub{ font-size:11.5px; color:#6B6459; margin-top:3px; display:flex; justify-content:space-between; }
  .bar-track{ height:5px; border-radius:3px; background:var(--bg); margin-top:7px; overflow:hidden; }
  .bar-fill{ height:100%; }

  .store-row{ display:flex; align-items:center; gap:9px; padding:9px 18px; cursor:pointer; border-bottom:1px solid #ECE8DD; }
  .store-row:hover{ background:var(--bg); }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .store-row .meta{ min-width:0; flex:1; }
  .store-row .code{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--teal-dark); font-weight:500; }
  .store-row .addr{ font-size:11.5px; color:#6B6459; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .store-row .msl{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; }

  .detail{ padding:16px 18px; }
  .detail h2{ font-family:'Space Grotesk',sans-serif; font-size:16px; margin:0 0 2px 0; }
  .detail .addr{ font-size:12.5px; color:#6B6459; margin-bottom:12px; }
  .metric-row{ display:flex; gap:10px; margin-bottom:14px; }
  .metric-box{ flex:1; border:1px solid var(--line); border-radius:8px; padding:10px; text-align:center; }
  .metric-box .m-label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; color:#6B6459; }
  .metric-box .m-value{ font-family:'Space Grotesk',sans-serif; font-size:20px; margin-top:2px; }

  table.skus{ width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:14px; }
  table.skus th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; color:#6B6459; padding:5px 4px; border-bottom:1px solid var(--line); }
  table.skus td{ padding:6px 4px; border-bottom:1px solid #ECE8DD; }
  table.skus td.msl{ font-family:'IBM Plex Mono',monospace; font-weight:600; text-align:right; }

  textarea.comment{ width:100%; min-height:80px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-family:'Inter',sans-serif; font-size:13px; resize:vertical; background:var(--bg); }
  .comment-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
  .save-btn{ background:var(--teal); color:#fff; border:none; padding:7px 14px; border-radius:6px; font-size:12.5px; cursor:pointer; }
  .save-btn:hover{ background:var(--teal-dark); }
  .saved-note{ font-size:11px; color:var(--green); }
  .back-link{ font-size:12px; color:var(--teal); cursor:pointer; margin-bottom:10px; display:inline-block; }
  .back-link:hover{ text-decoration:underline; }
  .flag-note{ font-size:11px; color:#C97A2B; margin-top:4px; }
  .partial-note{ font-size:11px; color:#C97A2B; background:#FBF0E2; border-radius:6px; padding:6px 10px; margin:0 18px 10px 18px; }
  ::-webkit-scrollbar{ width:8px; } ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
</style>
</head>

</div>

const comments = {};
let currentMonth = 'junio';
let currentMetric = 'msl';
let currentSku = ''; // '' = todos los SKU (vista general de la sala)
let state = { level:'nacional', responsable:null, supervisor:null, storeCode:null };

const SKU_LIST = [...new Set(RECORDS.flatMap(r => Object.values(r.skus||{}).flat().map(s=>s.sku)))].sort();

function getRegion(r){ return REGION_MAP[r.comuna] || 'Sin definir'; }

function getSkuValue(r, month, sku){
  const list = getSkus(r, month);
  const found = list.find(s => s.sku === sku);
  return found ? found.msl : null;
}

function getMonthData(r, month){ return (r.months && r.months[month]) || null; }
function getSkus(r, month){ return (r.skus && r.skus[month]) || []; }
function getValue(r, metric, month){
  const mo = month || currentMonth;
  if(metric==='msl' && currentSku){
    return getSkuValue(r, mo, currentSku);
  }
  const md = getMonthData(r, mo);
  if(!md) return null;
  return metric==='msl' ? md.msl : md.backstock;
}
function getStatus(r, metric, month){
  const v = getValue(r, metric, month);
  if(v === null || v === undefined) return 'sin_dato';
  if(metric === 'msl'){
    if(v < 70) return 'rojo';
    if(v < 90) return 'ambar';
    return 'verde';
  }
  return v > 7 ? 'rojo' : 'verde';
}
function colorFor(status){ return {rojo:'#C63C2C', ambar:'#E0A62B', verde:'#1F8A4C', sin_dato:'#9C9488'}[status] || '#9C9488'; }
function fmt1(n){ return (n===null||n===undefined) ? '—' : n.toFixed(1); }
function metricLabel(){
  if(currentMetric==='msl' && currentSku) return 'MSL · ' + (currentSku.length>28 ? currentSku.slice(0,28)+'…' : currentSku);
  return currentMetric==='msl' ? 'MSL' : 'Backstock';
}
function sortByOpportunity(a, b){
  const va = getValue(a, currentMetric), vb = getValue(b, currentMetric);
  const na = va===null, nb = vb===null;
  if(na && nb) return 0;
  if(na) return 1;
  if(nb) return -1;
  return currentMetric==='msl' ? (va-vb) : (vb-va); // worst first
}

// ---- Map ----
const map = L.map('map', {zoomControl:true}).setView([-33.6,-70.9], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
}).addTo(map);
let markerLayer = L.layerGroup().addTo(map);
let markerRefs = {};

function monthRecords(){
  return RECORDS.filter(r => {
    if(getMonthData(r, currentMonth) === null) return false;
    if(currentMetric==='msl' && currentSku){
      return getSkuValue(r, currentMonth, currentSku) !== null;
    }
    return true;
  });
}

function visibleRecords(){
  return monthRecords().filter(r=>{
    if(state.responsable && r.responsable !== state.responsable) return false;
    if(state.supervisor && r.supervisor !== state.supervisor) return false;
    return true;
  });
}

function renderMarkers(){
  markerLayer.clearLayers();
  markerRefs = {};
  const recs = visibleRecords();
  const bounds = [];
  recs.forEach(r=>{
    if(r.lat===null) return;
    const st = getStatus(r, currentMetric);
    const c = colorFor(st);
    const icon = L.divIcon({ className:'', iconSize:[14,14], iconAnchor:[7,7],
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${c};border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);"></div>` });
    const m = L.marker([r.lat, r.lng], {icon}).addTo(markerLayer);
    markerRefs[r.codigo] = m;
    const md = getMonthData(r, currentMonth);
    const precisionNote = r.precision === 'ciudad' ? '<div style="font-size:10.5px;color:#C97A2B;margin-top:3px;">Ubicación aproximada (nivel ciudad)</div>' : '';
    const dataText = md ? `MSL ${fmt1(md.msl)}% · Backstock ${fmt1(md.backstock)}%` : 'Sin dato este mes';
    m.bindPopup(`<b style="font-family:IBM Plex Mono,monospace;">${r.codigo}</b><br><span style="font-size:12px;color:#6B6459;">${r.direccion}</span><br><span style="font-size:11px;background:#EAF1F8;padding:2px 6px;border-radius:8px;">${r.comuna}</span><div style="margin-top:6px;font-size:12px;"><b style="color:${c};">${dataText}</b></div><div style="font-size:11px;color:#6B6459;margin-top:2px;">${r.supervisor} · ${r.responsable}</div>${precisionNote}`);
    m.on('click', ()=>{ goToStore(r.codigo); });
    bounds.push([r.lat, r.lng]);
  });
  if(state.level!=='store' && bounds.length){ try{ map.fitBounds(bounds, {padding:[40,40], maxZoom: state.level==='nacional'?6:13}); }catch(e){} }
}

function renderKPIs(){
  const recs = visibleRecords();
  const withData = recs.filter(r=>getValue(r,currentMetric)!==null);
  const avg = withData.length ? withData.reduce((a,r)=>a+getValue(r,currentMetric),0)/withData.length : null;
  const reds = recs.filter(r=>getStatus(r,currentMetric)==='rojo').length;
  const greens = recs.filter(r=>getStatus(r,currentMetric)==='verde').length;
  const cls = currentMetric==='msl' ? (avg<70?'red':avg<90?'amber':'green') : (avg>7?'red':'green');
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="label">Salas en vista</div><div class="value">${recs.length}</div></div>
    <div class="kpi"><div class="label">${metricLabel()} promedio</div><div class="value ${cls}">${fmt1(avg)}%</div></div>
    <div class="kpi"><div class="label">Salas sanas (verde)</div><div class="value green">${greens}</div></div>
    <div class="kpi"><div class="label">Salas en rojo</div><div class="value red">${reds}</div></div>
  `;
}

function renderBreadcrumb(){
  let html = `<span class="crumb ${state.level==='nacional'?'active':''}" onclick="goNacional()">Gerencia</span>`;
  if(state.responsable) html += `<span class="sep">›</span><span class="crumb ${state.level==='responsable'?'active':''}" onclick="goResponsable('${state.responsable}')">${state.responsable}</span>`;
  if(state.supervisor) html += `<span class="sep">›</span><span class="crumb ${state.level==='supervisor'?'active':''}" onclick="goSupervisor('${state.responsable}','${state.supervisor}')">${state.supervisor}</span>`;
  if(state.storeCode) html += `<span class="sep">›</span><span class="crumb active">${state.storeCode}</span>`;
  document.getElementById('breadcrumb').innerHTML = html;
}

function aggregate(recs){
  const withData = recs.filter(r=>getValue(r,currentMetric)!==null);
  const avg = withData.length ? withData.reduce((a,r)=>a+getValue(r,currentMetric),0)/withData.length : null;
  const reds = recs.filter(r=>getStatus(r,currentMetric)==='rojo').length;
  return {count:recs.length, avg, reds};
}
function tierColor(avg){
  if(avg===null) return '#9C9488';
  if(currentMetric==='msl') return avg<70?'#C63C2C':avg<90?'#E0A62B':'#1F8A4C';
  return avg>7?'#C63C2C':'#1F8A4C';
}
function barWidth(avg){ if(avg===null) return 0; return currentMetric==='msl' ? Math.min(avg,100) : Math.min(avg*6,100); }

// ---- Month tabs & metric toggle ----
function renderControls(){
  const mt = document.getElementById('monthTabs');
  mt.innerHTML = MONTHS.map(m=>`<button class="mbtn ${currentMonth===m.key?'active':''}" onclick="setMonth('${m.key}')">${m.label} <span class="tag">${m.tag}</span></button>`).join('');
  const tt = document.getElementById('metricToggle');
  tt.innerHTML = `<button class="mtbtn ${currentMetric==='msl'?'active':''}" onclick="setMetric('msl')">MSL</button><button class="mtbtn ${currentMetric==='backstock'?'active':''}" onclick="setMetric('backstock')">Backstock</button>`;

  const sf = document.getElementById('skuFilterWrap');
  const disabled = currentMetric!=='msl';
  const options = ['<option value="">Todos los SKU (vista general)</option>']
    .concat(SKU_LIST.map(s=>`<option value="${s}" ${currentSku===s?'selected':''}>${s}</option>`));
  sf.innerHTML = `<select id="skuSelect" ${disabled?'disabled':''} onchange="setSku(this.value)">${options.join('')}</select>`;
  if(disabled && currentSku){ /* keep selection remembered, just inactive visually */ }

  const note = document.getElementById('partialNote');
  const m = MONTHS.find(x=>x.key===currentMonth);
  let extra = '';
  if(m.key==='julio') extra += `<div class="partial-note" style="margin:0 24px 8px 24px;">Actualizado a la primera semana — W01 Derma.</div>`;
  if(currentMetric==='msl' && currentSku) extra += `<div class="partial-note" style="margin:0 24px 8px 24px;">Viendo solo el SKU: <b>${currentSku}</b> — el Backstock mostrado en el detalle sigue siendo el de la sala completa.</div>`;
  note.innerHTML = extra;
}
function setMonth(m){ currentMonth = m; refresh(); }
function setMetric(m){ currentMetric = m; refresh(); }
function setSku(s){ currentSku = s; refresh(); }
window.setMonth = setMonth;
window.setMetric = setMetric;
window.setSku = setSku;

// ---- Plan General table ----
function renderPlanGeneral(){
  const rows = PLAN_GENERAL.filter(p=>p.Mes===currentMonth);
  const val = p => currentMetric==='msl' ? p.MSL : p.Backstock;
  rows.sort((a,b)=> currentMetric==='msl' ? val(a)-val(b) : val(b)-val(a));
  let html = `<div class="plan-general"><h3>Plan General — resultado por Retailer / Recurso / Responsable</h3><table class="pg"><thead><tr><th>Retailer</th><th>Recurso</th><th>Resp.</th><th style="text-align:right;">Salas</th><th style="text-align:right;">${metricLabel()}</th></tr></thead><tbody>`;
  rows.forEach(p=>{
    const c = tierColor(val(p));
    html += `<tr><td>${p.Retailer}</td><td>${p.Tipo_Recurso}</td><td>${p.Responsable.replace('Cecilia Sepulveda','Cecilia S.').replace('Fernando Cardenas','Fernando C.')}</td><td class="num">${Math.round(p.N_Stores)}</td><td class="num" style="color:${c};">${val(p).toFixed(1)}%</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

// ---- Side renderers ----
function renderRegionRanking(){
  const recs = monthRecords();
  const regions = [...new Set(recs.map(getRegion))];
  const rows = regions.map(reg=>{
    const rr = recs.filter(r=>getRegion(r)===reg);
    return {region:reg, agg: aggregate(rr)};
  });
  rows.sort((a,b)=> currentMetric==='msl' ? (a.agg.avg??101)-(b.agg.avg??101) : (b.agg.avg??-1)-(a.agg.avg??-1));
  let html = `<div class="region-block"><h3>Ranking por región — de más débil a más fuerte (${metricLabel()})</h3><table class="region"><thead><tr><th>Región</th><th style="text-align:right;">Salas</th><th style="text-align:right;">Rojas</th><th style="text-align:right;">${metricLabel()}</th></tr></thead><tbody>`;
  rows.forEach((row, i)=>{
    const c = tierColor(row.agg.avg);
    html += `<tr class="${i===0?'worst':''}"><td>${row.region}</td><td class="num">${row.agg.count}</td><td class="num" style="color:#C63C2C;">${row.agg.reds}</td><td class="num" style="color:${c};">${fmt1(row.agg.avg)}%</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function renderSideNacional(){
  const responsables = [...new Set(monthRecords().map(r=>r.responsable))];
  const aggd = responsables.map(resp=>({resp, agg: aggregate(monthRecords().filter(r=>r.responsable===resp))}));
  aggd.sort((a,b)=> currentMetric==='msl' ? (a.agg.avg??101)-(b.agg.avg??101) : (b.agg.avg??-1)-(a.agg.avg??-1));
  let html = `<div class="side-header"><h2>Vista nacional</h2><p>Selecciona un responsable de zona para profundizar — vista actual: <b>${metricLabel()}</b>, ${MONTHS.find(m=>m.key===currentMonth).label}</p></div>`;
  html += renderRegionRanking();
  html += `<div class="cards">`;
  aggd.forEach(({resp, agg})=>{
    const color = tierColor(agg.avg);
    html += `<div class="card" onclick="goResponsable('${resp}')">
      <div class="card-top"><span class="card-name">${resp}</span><span class="card-msl" style="color:${color};">${fmt1(agg.avg)}%</span></div>
      <div class="card-sub"><span>${agg.count} salas</span><span>${agg.reds} en rojo</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barWidth(agg.avg)}%;background:${color};"></div></div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('side').innerHTML = html;
}

function renderSideResponsable(){
  const recs = monthRecords().filter(r=>r.responsable===state.responsable);
  const supervisors = [...new Set(recs.map(r=>r.supervisor))];
  const aggd = supervisors.map(sup=>({sup, agg: aggregate(recs.filter(r=>r.supervisor===sup))}));
  aggd.sort((a,b)=> currentMetric==='msl' ? (a.agg.avg??101)-(b.agg.avg??101) : (b.agg.avg??-1)-(a.agg.avg??-1));
  let html = `<div class="side-header"><span class="back-link" onclick="goNacional()">‹ Volver a Gerencia</span><h2>${state.responsable}</h2><p>Supervisores a su cargo — ordenados por oportunidad de <b>${metricLabel()}</b></p></div><div class="cards">`;
  aggd.forEach(({sup, agg})=>{
    const color = tierColor(agg.avg);
    html += `<div class="card" onclick="goSupervisor('${state.responsable}','${sup}')">
      <div class="card-top"><span class="card-name">${sup}</span><span class="card-msl" style="color:${color};">${fmt1(agg.avg)}%</span></div>
      <div class="card-sub"><span>${agg.count} salas</span><span>${agg.reds} en rojo</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barWidth(agg.avg)}%;background:${color};"></div></div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('side').innerHTML = html;
}

function renderSideSupervisor(){
  const recs = monthRecords().filter(r=>r.responsable===state.responsable && r.supervisor===state.supervisor).sort(sortByOpportunity);
  let html = `<div class="side-header"><span class="back-link" onclick="goResponsable('${state.responsable}')">‹ Volver a ${state.responsable}</span><h2>${state.supervisor}</h2><p>${recs.length} salas — ordenadas por oportunidad de <b>${metricLabel()}</b></p></div>`;
  recs.forEach(r=>{
    const c = colorFor(getStatus(r, currentMetric));
    html += `<div class="store-row" onclick="goToStore('${r.codigo}')">
      <span class="dot" style="background:${c};"></span>
      <div class="meta"><div class="code">${r.codigo}</div><div class="addr">${r.direccion}</div></div>
      <div class="msl" style="color:${c};">${fmt1(getValue(r,currentMetric))}%</div>
    </div>`;
  });
  document.getElementById('side').innerHTML = html;
}

      ${r.precision==='sin_ubicar' ? '<div class="flag-note">Sin datos suficientes para geolocalizar esta dirección</div>' : ''}
      ${!md ? '<div class="flag-note">Esta sala no registra visita en '+MONTHS.find(m=>m.key===currentMonth).label+'</div>' : ''}
      <div class="metric-row">

        <div class="metric-box"><div class="m-label">Backstock (rojo &gt;7%)</div><div class="m-value" style="color:${cBs};">${fmt1(md?md.backstock:null)}%</div></div>
      </div>
      <table class="skus"><thead><tr><th>SKU foco (derma) — MSL</th><th style="text-align:right;"></th></tr></thead><tbody>${skuRows || '<tr><td colspan=2 style="color:#9C9488;">Sin datos de SKU este mes</td></tr>'}</tbody></table>
      <div class="label" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;color:#6B6459;margin-bottom:6px;">Comentario del supervisor</div>
      <textarea class="comment" id="commentBox" placeholder="¿Qué está pasando en esta sala? ¿Necesitas empuje con algún SKU?">${savedComment}</textarea>
      <div class="comment-actions">
        <button class="save-btn" onclick="saveComment('${r.codigo}')">Guardar comentario</button>
        <span class="saved-note" id="savedNote" style="opacity:0;">Guardado ✓</span>
      </div>
      <p style="font-size:10.5px;color:#9C9488;margin-top:8px;">El comentario se envía a la hoja de Google que revisa gerencia. También queda visible aquí mientras esta pestaña del navegador siga abierta.</p>
    </div>
  `;
}

function saveComment(codigo){
  const r = RECORDS.find(x=>x.codigo===codigo);
  const texto = document.getElementById('commentBox').value;
  comments[codigo] = texto;
  const note = document.getElementById('savedNote');

  const useForm = GOOGLE_FORM_ID && GOOGLE_FORM_ENTRY_CODIGO && GOOGLE_FORM_ENTRY_SUPERVISOR && GOOGLE_FORM_ENTRY_COMENTARIO;
  const useScript = !!GOOGLE_SCRIPT_URL;

  if(!useForm && !useScript){
    note.textContent = 'Falta configurar Google Forms o Google Apps Script (ver instrucciones_google_forms.md)';
    note.style.color = '#C63C2C';
    note.style.opacity = 1;
    setTimeout(()=>{ note.style.opacity = 0; }, 3500);
    return;
  }

  note.textContent = 'Guardando…';
  note.style.color = '#6B6459';
  note.style.opacity = 1;

  let request;
  if(useForm){
    const formData = new URLSearchParams();
    formData.append(GOOGLE_FORM_ENTRY_CODIGO, r.codigo);
    formData.append(GOOGLE_FORM_ENTRY_SUPERVISOR, r.supervisor);
    formData.append(GOOGLE_FORM_ENTRY_COMENTARIO, texto);
    request = fetch(`https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });
  } else {
    request = fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ codigo: r.codigo, supervisor: r.supervisor, comentario: texto })
    });
  }

  request.then(()=>{
    note.textContent = 'Guardado ✓';
    note.style.color = '#1F8A4C';
    setTimeout(()=>{ note.style.opacity = 0; }, 1800);
  }).catch(()=>{
    note.textContent = 'No se pudo enviar (revisa tu conexión)';
    note.style.color = '#C63C2C';
    setTimeout(()=>{ note.style.opacity = 0; }, 3500);
  });
}
window.saveComment = saveComment;

function goNacional(){ state = {level:'nacional', responsable:null, supervisor:null, storeCode:null}; refresh(); }
function goResponsable(resp){ state = {level:'responsable', responsable:resp, supervisor:null, storeCode:null}; refresh(); }
function goSupervisor(resp, sup){ state = {level:'supervisor', responsable:resp, supervisor:sup, storeCode:null}; refresh(); }
function goToStore(codigo){
  const r = RECORDS.find(x=>x.codigo===codigo);
  state = {level:'store', responsable:r.responsable, supervisor:r.supervisor, storeCode:codigo};
  refresh();
  if(r.lat!==null && r.lng!==null){
    map.setView([r.lat, r.lng], 16, {animate:true});
    const found = markerRefs[codigo];
    if(found) found.openPopup();
  }
}
window.goNacional = goNacional; window.goResponsable = goResponsable; window.goSupervisor = goSupervisor; window.goToStore = goToStore;

function updateLegend(){
  const el = document.getElementById('legendBody');
  if(currentMetric==='msl'){
    el.innerHTML = `<div><span class="sw" style="background:#1F8A4C"></span> Sana — MSL ≥ 90%</div><div><span class="sw" style="background:#E0A62B"></span> Oportunidad media — MSL 70–90%</div><div><span class="sw" style="background:#C63C2C"></span> Oportunidad alta — MSL &lt; 70%</div><div><span class="sw" style="background:#9C9488"></span> Sin ubicación exacta / sin dato</div>`;
  } else {
    el.innerHTML = `<div><span class="sw" style="background:#1F8A4C"></span> Sana — Backstock ≤ 7%</div><div><span class="sw" style="background:#C63C2C"></span> Alerta — Backstock &gt; 7%</div><div><span class="sw" style="background:#9C9488"></span> Sin ubicación exacta / sin dato</div>`;
  }
}

function refresh(){
  renderControls();
  renderBreadcrumb();
  renderKPIs();
  renderMarkers();
  updateLegend();
  if(state.level==='nacional') renderSideNacional();
  else if(state.level==='responsable') renderSideResponsable();
  else if(state.level==='supervisor') renderSideSupervisor();
  else if(state.level==='store') renderSideStore();
}

refresh();
</script>
</body>
</html>
