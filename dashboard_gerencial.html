<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Gerencial — Plan Backstock Derma</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#132A2E; --panel:#FFFFFF; --line:#DDD8CC;
    --teal:#1F5F5B; --teal-dark:#123B39;
    --green:#1F8A4C; --amber:#E0A62B; --red:#C63C2C; --gray:#9C9488;
    --bg:#EFEBE1;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--ink); }
  .app{ display:flex; flex-direction:column; height:100vh; min-height:680px; }

  .topbar{
    background:var(--teal-dark); color:#fff; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .topbar .title{ display:flex; flex-direction:column; }
  .topbar .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#8FC7BE; }
  .topbar h1{ font-family:'Space Grotesk',sans-serif; font-size:19px; margin:2px 0 0 0; }
  .breadcrumb{ display:flex; align-items:center; gap:6px; font-size:13px; flex-wrap:wrap; }
  .crumb{ cursor:pointer; padding:5px 10px; border-radius:6px; background:rgba(255,255,255,0.08); }
  .crumb:hover{ background:rgba(255,255,255,0.18); }
  .crumb.active{ background:#fff; color:var(--teal-dark); font-weight:600; }
  .sep{ opacity:.5; }

  .kpirow{ display:flex; gap:12px; padding:14px 24px; background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .kpi{ flex:1; min-width:140px; border:1px solid var(--line); border-radius:10px; padding:10px 14px; }
  .kpi .label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:#6B6459; }
  .kpi .value{ font-family:'Space Grotesk',sans-serif; font-size:24px; margin-top:2px; }
  .kpi .value.red{ color:var(--red); } .kpi .value.green{ color:var(--green); } .kpi .value.amber{ color:var(--amber); }

  .body{ flex:1; display:grid; grid-template-columns: 1fr 420px; min-height:0; }
  .map-col{ position:relative; }
  #map{ height:100%; width:100%; }
  .legend{
    position:absolute; bottom:16px; left:16px; z-index:500; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; padding:10px 14px; font-size:12px; color:#6B6459;
    box-shadow:0 2px 10px rgba(19,42,46,0.1);
  }
  .legend div{ display:flex; align-items:center; gap:8px; margin:3px 0; }
  .legend .sw{ width:10px; height:10px; border-radius:50%; }

  .side{ background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; display:flex; flex-direction:column; }
  .side-header{ padding:14px 18px; border-bottom:1px solid var(--line); }
  .side-header h2{ font-family:'Space Grotesk',sans-serif; font-size:15px; margin:0 0 4px 0; }
  .side-header p{ margin:0; font-size:12px; color:#6B6459; }
  .filters{ padding:10px 18px; border-bottom:1px solid var(--line); display:flex; gap:8px; flex-wrap:wrap; }
  .filters select{ flex:1; min-width:110px; padding:6px 8px; border:1px solid var(--line); border-radius:6px; background:var(--bg); font-size:12px; }

  .cards{ padding:12px 18px; display:flex; flex-direction:column; gap:8px; }
  .card{
    border:1px solid var(--line); border-radius:10px; padding:11px 13px; cursor:pointer; background:#fff;
    transition:box-shadow .15s, border-color .15s;
  }
  .card:hover{ box-shadow:0 2px 8px rgba(19,42,46,0.12); border-color:var(--teal); }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .card-name{ font-weight:600; font-size:13.5px; }
  .card-msl{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; }
  .card-sub{ font-size:11.5px; color:#6B6459; margin-top:3px; display:flex; justify-content:space-between; }
  .bar-track{ height:5px; border-radius:3px; background:var(--bg); margin-top:7px; overflow:hidden; }
  .bar-fill{ height:100%; }

  .store-row{
    display:flex; align-items:center; gap:9px; padding:9px 18px; cursor:pointer; border-bottom:1px solid #ECE8DD;
  }
  .store-row:hover{ background:var(--bg); }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .store-row .meta{ min-width:0; flex:1; }
  .store-row .code{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--teal-dark); font-weight:500; }
  .store-row .addr{ font-size:11.5px; color:#6B6459; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .store-row .msl{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; }

  .detail{ padding:16px 18px; }
  .detail h2{ font-family:'Space Grotesk',sans-serif; font-size:16px; margin:0 0 2px 0; }
  .detail .addr{ font-size:12.5px; color:#6B6459; margin-bottom:12px; }
  .metric-row{ display:flex; gap:10px; margin-bottom:14px; }
  .metric-box{ flex:1; border:1px solid var(--line); border-radius:8px; padding:10px; text-align:center; }
  .metric-box .m-label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; color:#6B6459; }
  .metric-box .m-value{ font-family:'Space Grotesk',sans-serif; font-size:20px; margin-top:2px; }

  table.skus{ width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:14px; }
  table.skus th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; color:#6B6459; padding:5px 4px; border-bottom:1px solid var(--line); }
  table.skus td{ padding:6px 4px; border-bottom:1px solid #ECE8DD; }
  table.skus td.msl{ font-family:'IBM Plex Mono',monospace; font-weight:600; text-align:right; }

  textarea.comment{
    width:100%; min-height:80px; border:1px solid var(--line); border-radius:8px; padding:8px 10px;
    font-family:'Inter',sans-serif; font-size:13px; resize:vertical; background:var(--bg);
  }
  .comment-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
  .save-btn{
    background:var(--teal); color:#fff; border:none; padding:7px 14px; border-radius:6px; font-size:12.5px; cursor:pointer;
  }
  .save-btn:hover{ background:var(--teal-dark); }
  .saved-note{ font-size:11px; color:var(--green); }
  .back-link{ font-size:12px; color:var(--teal); cursor:pointer; margin-bottom:10px; display:inline-block; }
  .back-link:hover{ text-decoration:underline; }
  .flag-note{ font-size:11px; color:#C97A2B; margin-top:4px; }
  .metric-toggle{ display:flex; gap:6px; margin-bottom:10px; }
  .mtbtn{
    flex:1; padding:7px 10px; border:1px solid var(--line); background:#fff; border-radius:7px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; color:var(--ink);
  }
  .mtbtn.active{ background:var(--teal-dark); color:#fff; border-color:var(--teal-dark); }
  .mtbtn:hover:not(.active){ border-color:var(--teal); }
  ::-webkit-scrollbar{ width:8px; } ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
</style>
</head>

  <div class="topbar">

      <div class="eyebrow">Plan Backstock · Derma · Abril</div>
      <h1>Dashboard Gerencial — Cobertura MSL</h1>

        <div><span class="sw" style="background:#9C9488"></span> Sin ubicación exacta / sin dato</div>
      </div>
    </div>

    <div class="side" id="side"></div>
  </div>
</div>

// ---- Comments store (session only) ----
const comments = {};

// ---- Metric toggle ----
let currentMetric = 'msl'; // 'msl' | 'backstock'

function getValue(r, metric){
  return metric==='msl' ? r.msl : r.backstock;
}
function getStatus(r, metric){
  const v = getValue(r, metric);
  if(v === null || v === undefined) return 'sin_dato';
  if(metric === 'msl'){
    if(v < 70) return 'rojo';
    if(v < 90) return 'ambar';
    return 'verde';
  } else {
    return v > 7 ? 'rojo' : 'verde';
  }
}
function colorFor(status){
  return {rojo:'#C63C2C', ambar:'#E0A62B', verde:'#1F8A4C', sin_dato:'#9C9488'}[status] || '#9C9488';
}
function fmt1(n){ return (n===null||n===undefined) ? '—' : n.toFixed(1); }
function metricLabel(){ return currentMetric==='msl' ? 'MSL' : 'Backstock'; }
// worse-first sort: for MSL ascending (lower is worse), for backstock descending (higher is worse)
function sortByOpportunity(a, b){
  const va = getValue(a, currentMetric), vb = getValue(b, currentMetric);
  const na = va===null ? true : false, nb = vb===null ? true : false;
  if(na && nb) return 0;
  if(na) return 1;
  if(nb) return -1;
  return currentMetric==='msl' ? (va-vb) : (vb-va);
}

// ---- App state ----
let state = { level:'nacional', responsable:null, manager:null, storeCode:null };

// ---- Map setup ----
const map = L.map('map', {zoomControl:true}).setView([-33.6,-70.9], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);

function visibleRecords(){
  return RECORDS.filter(r=>{
    if(state.responsable && r.responsable !== state.responsable) return false;
    if(state.manager && r.store_manager !== state.manager) return false;
    return true;
  });
}

function renderMarkers(){
  markerLayer.clearLayers();
  const recs = visibleRecords();
  const bounds = [];
  recs.forEach(r=>{
    if(r.lat===null) return;
    const st = getStatus(r, currentMetric);
    const c = colorFor(st);
    const icon = L.divIcon({
      className:'', iconSize:[14,14], iconAnchor:[7,7],
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${c};border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);"></div>`
    });
    const m = L.marker([r.lat, r.lng], {icon}).addTo(markerLayer);
    const precisionNote = r.precision === 'ciudad' ? '<div style="font-size:10.5px;color:#C97A2B;margin-top:3px;">Ubicación aproximada (nivel ciudad)</div>' : '';
    m.bindPopup(`<b style="font-family:IBM Plex Mono,monospace;">${r.codigo}</b><br><span style="font-size:12px;color:#6B6459;">${r.direccion}</span><br><span style="font-size:11px;background:#EFEBE1;padding:2px 6px;border-radius:8px;">${r.comuna}</span><div style="margin-top:6px;font-size:12px;"><b style="color:${c};">${metricLabel()} ${fmt1(getValue(r,currentMetric))}%</b></div><div style="font-size:11px;color:#6B6459;margin-top:2px;">MSL ${fmt1(r.msl)}% · Backstock ${fmt1(r.backstock)}%</div><div style="font-size:11px;color:#6B6459;margin-top:2px;">${r.store_manager} · ${r.responsable}</div>${precisionNote}`);
    m.on('click', ()=>{ goToStore(r.codigo); });
    bounds.push([r.lat, r.lng]);
  });
  if(bounds.length){
    try{ map.fitBounds(bounds, {padding:[40,40], maxZoom: state.level==='nacional'?6:13}); }catch(e){}
  }
}

// ---- KPI row ----
function renderKPIs(){
  const recs = visibleRecords();
  const withData = recs.filter(r=>getValue(r,currentMetric)!==null);
  const avg = withData.length ? withData.reduce((a,r)=>a+getValue(r,currentMetric),0)/withData.length : null;
  const reds = recs.filter(r=>getStatus(r,currentMetric)==='rojo').length;
  const greens = recs.filter(r=>getStatus(r,currentMetric)==='verde').length;
  const goodBadClass = currentMetric==='msl'
    ? (avg<70?'red':avg<90?'amber':'green')
    : (avg>7?'red':'green');
  const el = document.getElementById('kpiRow');
  el.innerHTML = `
    <div class="kpi"><div class="label">Salas en vista</div><div class="value">${recs.length}</div></div>
    <div class="kpi"><div class="label">${metricLabel()} promedio</div><div class="value ${goodBadClass}">${fmt1(avg)}%</div></div>
    <div class="kpi"><div class="label">Salas sanas (verde)</div><div class="value green">${greens}</div></div>
    <div class="kpi"><div class="label">Salas en rojo</div><div class="value red">${reds}</div></div>
  `;
}

// ---- Breadcrumb ----
function renderBreadcrumb(){
  const el = document.getElementById('breadcrumb');
  let html = `<span class="crumb ${state.level==='nacional'?'active':''}" onclick="goNacional()">Gerencia</span>`;
  if(state.responsable){
    html += `<span class="sep">›</span><span class="crumb ${state.level==='responsable'?'active':''}" onclick="goResponsable('${state.responsable}')">${state.responsable}</span>`;
  }
  if(state.manager){
    html += `<span class="sep">›</span><span class="crumb ${state.level==='manager'?'active':''}" onclick="goManager('${state.responsable}','${state.manager}')">${state.manager}</span>`;
  }
  if(state.storeCode){
    html += `<span class="sep">›</span><span class="crumb active">${state.storeCode}</span>`;
  }
  el.innerHTML = html;
}

// ---- Aggregation helpers ----
function aggregate(recs){
  const withData = recs.filter(r=>getValue(r,currentMetric)!==null);
  const avg = withData.length ? withData.reduce((a,r)=>a+getValue(r,currentMetric),0)/withData.length : null;
  const reds = recs.filter(r=>getStatus(r,currentMetric)==='rojo').length;
  return {count:recs.length, avg, reds};
}
function tierColor(avg){
  if(avg===null) return '#9C9488';
  if(currentMetric==='msl'){
    return avg<70?'#C63C2C':avg<90?'#E0A62B':'#1F8A4C';
  }
  return avg>7?'#C63C2C':'#1F8A4C';
}
function barWidth(avg){
  if(avg===null) return 0;
  return currentMetric==='msl' ? Math.min(avg,100) : Math.min(avg*6,100); // scale backstock visually
}

// ---- Metric toggle UI ----
function renderMetricToggle(){
  return `<div class="metric-toggle">
    <button class="mtbtn ${currentMetric==='msl'?'active':''}" onclick="setMetric('msl')">MSL</button>
    <button class="mtbtn ${currentMetric==='backstock'?'active':''}" onclick="setMetric('backstock')">Backstock</button>
  </div>`;
}
function setMetric(m){ currentMetric = m; refresh(); }
window.setMetric = setMetric;

// ---- Side panel renderers ----
function renderSideNacional(){
  const responsables = [...new Set(RECORDS.map(r=>r.responsable))];
  let html = `<div class="side-header">${renderMetricToggle()}<h2>Vista nacional</h2><p>Selecciona un responsable de zona para profundizar — vista actual: <b>${metricLabel()}</b></p></div><div class="cards">`;
  responsables.forEach(resp=>{
    const recs = RECORDS.filter(r=>r.responsable===resp);
    const agg = aggregate(recs);
    const color = tierColor(agg.avg);
    html += `<div class="card" onclick="goResponsable('${resp}')">
      <div class="card-top"><span class="card-name">${resp}</span><span class="card-msl" style="color:${color};">${fmt1(agg.avg)}%</span></div>
      <div class="card-sub"><span>${agg.count} salas</span><span>${agg.reds} en rojo</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barWidth(agg.avg)}%;background:${color};"></div></div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('side').innerHTML = html;
}

function renderSideManager(){
  const recs = RECORDS.filter(r=>r.responsable===state.responsable && r.store_manager===state.manager)
                      .sort(sortByOpportunity);

  recs.forEach(r=>{

      <div class="addr">${r.direccion} · ${r.comuna}</div>
      <div class="addr">Store Manager: <b>${r.store_manager}</b> · Responsable: <b>${r.responsable}</b></div>
      ${r.precision==='ciudad' ? '<div class="flag-note">⚠ Ubicación aproximada a nivel ciudad — confirmar dirección exacta</div>' : ''}
      ${r.precision==='sin_ubicar' ? '<div class="flag-note">⚠ Sin datos suficientes para geolocalizar esta dirección</div>' : ''}
      <div class="metric-row">
        <div class="metric-box"><div class="m-label">MSL (sano ≥90%)</div><div class="m-value" style="color:${cMsl};">${fmt1(r.msl)}%</div></div>
        <div class="metric-box"><div class="m-label">Backstock (rojo &gt;7%)</div><div class="m-value" style="color:${cBs};">${fmt1(r.backstock)}%</div></div>
      </div>
      <table class="skus"><thead><tr><th>SKU foco (derma) — MSL</th><th style="text-align:right;"></th></tr></thead><tbody>${skuRows}</tbody></table>
      <div class="label" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;color:#6B6459;margin-bottom:6px;">Comentario del supervisor</div>
      <textarea class="comment" id="commentBox" placeholder="¿Qué está pasando en esta sala? ¿Necesitas empuje con algún SKU?">${savedComment}</textarea>
      <div class="comment-actions">
        <button class="save-btn" onclick="saveComment('${r.codigo}')">Guardar comentario</button>
        <span class="saved-note" id="savedNote" style="opacity:0;">Guardado ✓</span>
      </div>
      <p style="font-size:10.5px;color:#9C9488;margin-top:8px;">Nota: este comentario queda guardado solo en esta sesión del navegador. Al cerrar el archivo se pierde.</p>
    </div>
  `;
}

function saveComment(codigo){
  comments[codigo] = document.getElementById('commentBox').value;
  const note = document.getElementById('savedNote');
  note.style.opacity = 1;
  setTimeout(()=>{ note.style.opacity = 0; }, 1800);
}

// ---- Navigation ----
function goNacional(){ state = {level:'nacional', responsable:null, manager:null, storeCode:null}; refresh(); }
function goResponsable(resp){ state = {level:'responsable', responsable:resp, manager:null, storeCode:null}; refresh(); }
function goManager(resp, mgr){ state = {level:'manager', responsable:resp, manager:mgr, storeCode:null}; refresh(); }
function goToStore(codigo){
  const r = RECORDS.find(x=>x.codigo===codigo);
  state = {level:'store', responsable:r.responsable, manager:r.store_manager, storeCode:codigo};
  refresh();
}
window.goNacional = goNacional;
window.goResponsable = goResponsable;
window.goManager = goManager;
window.goToStore = goToStore;
window.saveComment = saveComment;

function refresh(){
  renderBreadcrumb();
  renderKPIs();
  renderMarkers();
  updateLegend();
  if(state.level==='nacional') renderSideNacional();
  else if(state.level==='responsable') renderSideResponsable();
  else if(state.level==='manager') renderSideManager();
  else if(state.level==='store') renderSideStore();
}

function updateLegend(){
  const el = document.getElementById('legendBody');
  if(currentMetric==='msl'){
    el.innerHTML = `
      <div><span class="sw" style="background:#1F8A4C"></span> Sana — MSL ≥ 90%</div>
      <div><span class="sw" style="background:#E0A62B"></span> Oportunidad media — MSL 70–90%</div>
      <div><span class="sw" style="background:#C63C2C"></span> Oportunidad alta — MSL &lt; 70%</div>
      <div><span class="sw" style="background:#9C9488"></span> Sin ubicación exacta / sin dato</div>`;
  } else {
    el.innerHTML = `
      <div><span class="sw" style="background:#1F8A4C"></span> Sana — Backstock ≤ 7%</div>
      <div><span class="sw" style="background:#C63C2C"></span> Alerta — Backstock &gt; 7%</div>
      <div><span class="sw" style="background:#9C9488"></span> Sin ubicación exacta / sin dato</div>`;
  }
}

refresh();
</script>
</body>
</html>
