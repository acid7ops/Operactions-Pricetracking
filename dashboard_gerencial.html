<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Gerencial — Plan Backstock Derma</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --nivea:#0057A8; --nivea-deep:#00294F; --nivea-mid:#0A3D73;
    --ink:#0B1C2C; --muted:#5B6B7C; --faint:#8698A8;
    --paper:#FFFFFF; --canvas:#EEF3F9; --line:#DCE6F0; --mist:#E7EFF8;
    --green:#158A4A; --amber:#D89A1F; --red:#C0392B; --gray:#9AA7B4;
    --r-sm:8px; --r-md:12px; --r-lg:18px;
    --shadow-sm:0 1px 2px rgba(10,27,46,.07);
    --shadow-md:0 6px 20px rgba(10,27,46,.09);
    --shadow-lg:0 16px 40px rgba(10,27,46,.16);
    --bg:var(--canvas); --teal:var(--nivea); --teal-dark:var(--nivea-deep);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--canvas); font-family:'Inter',sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased; }
  .app{ display:flex; flex-direction:column; height:100vh; min-height:680px; }

  /* ---------- Signature: shelf-tick strip (gondola shelf-edge motif) ---------- */
  .shelf-ticks{
    height:5px; width:100%;
    background: linear-gradient(90deg, var(--nivea-mid) 0%, var(--nivea) 50%, var(--nivea-mid) 100%);
  }

  /* ---------- Topbar ---------- */
  .topbar{
    background:linear-gradient(135deg, var(--nivea-deep) 0%, var(--nivea-mid) 100%);
    color:#fff; padding:16px 26px 14px 26px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    box-shadow: var(--shadow-md);
    position:relative; z-index:2;
  }
  .topbar .title{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.28); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .brand-mark::before, .brand-mark::after{
    content:''; position:absolute; left:6px; right:6px; height:2px; background:#fff; border-radius:2px;
  }
  .brand-mark::before{ top:11px; opacity:.95; }
  .brand-mark::after{ top:17px; width:60%; opacity:.6; }
  .title-text{ display:flex; flex-direction:column; }
  .topbar .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:#A9CDEF; }
  .topbar h1{ font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; margin:2px 0 0 0; letter-spacing:-.01em; }
  .breadcrumb{ display:flex; align-items:center; gap:6px; font-size:12.5px; flex-wrap:wrap; }
  .crumb{ cursor:pointer; padding:6px 12px; border-radius:20px; background:rgba(255,255,255,0.10); transition:background .15s; font-weight:500; }
  .crumb:hover{ background:rgba(255,255,255,0.22); }
  .crumb.active{ background:#fff; color:var(--nivea-deep); font-weight:700; }
  .sep{ opacity:.4; }

  /* ---------- View tabs ---------- */
  .view-tabs{ display:flex; gap:2px; background:var(--nivea-deep); padding:0 26px; position:relative; }
  .vtab{
    padding:11px 20px; background:transparent; border:none; color:#8FB6DD; cursor:pointer;
    font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; letter-spacing:.01em;
    border-bottom:3px solid transparent; transition:color .15s;
  }
  .vtab:hover{ color:#fff; }
  .vtab.active{ color:#fff; border-bottom-color:#fff; }

  /* ---------- Control bar ---------- */
  .controlbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:12px 26px; background:var(--paper); border-bottom:1px solid var(--line); flex-wrap:wrap;
  }
  .week-tabs{ display:flex; gap:6px; }
  .mbtn{
    padding:7px 15px; border:1px solid var(--line); background:var(--paper); border-radius:20px;
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; cursor:pointer; color:var(--ink);
    display:flex; align-items:center; gap:7px; transition:all .15s;
  }
  .mbtn:hover{ border-color:var(--nivea); }
  .mbtn.active{ background:var(--nivea-deep); color:#fff; border-color:var(--nivea-deep); box-shadow:var(--shadow-sm); }
  .mbtn .tag{ font-size:9px; padding:2px 6px; border-radius:8px; background:rgba(0,0,0,.06); }
  .mbtn.active .tag{ background:rgba(255,255,255,.18); }
  .metric-toggle{ display:flex; gap:4px; background:var(--mist); padding:3px; border-radius:10px; }
  .mtbtn{
    padding:7px 16px; border:none; background:transparent; border-radius:7px;
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; cursor:pointer; color:var(--muted); font-weight:600;
    transition:all .15s;
  }
  .mtbtn.active{ background:var(--nivea); color:#fff; box-shadow:var(--shadow-sm); }
  .sku-filter select{
    padding:7px 12px; border:1px solid var(--line); border-radius:9px; background:var(--paper);
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink); max-width:280px;
  }
  .sku-filter select:disabled{ opacity:.4; cursor:not-allowed; }

  /* ---------- Chain / retailer row ---------- */
  .chain-row{ display:flex; gap:12px; padding:14px 26px; background:var(--paper); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .chain-card{
    flex:1; min-width:170px; border:1px solid var(--line); border-radius:var(--r-md); padding:12px 15px;
    background:linear-gradient(180deg, #fff 0%, var(--canvas) 140%);
    transition:box-shadow .15s, transform .15s;
  }
  .chain-card:hover{ box-shadow:var(--shadow-sm); transform:translateY(-1px); }
  .chain-card .label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; }
  .chain-card .val{ font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:600; margin-top:3px; }
  .chain-card .sub{ font-size:11px; color:var(--muted); margin-top:2px; }

  /* ---------- KPI row (gauge cards) ---------- */
  .kpirow{ display:flex; gap:12px; padding:16px 26px; background:var(--paper); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .kpi{
    flex:1; min-width:180px; border:1px solid var(--line); border-radius:var(--r-md); padding:13px 16px;
    display:flex; align-items:center; gap:12px; background:#fff;
    transition:box-shadow .15s, transform .15s;
  }
  .kpi:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .kpi .gauge{ flex-shrink:0; }
  .kpi .kbody{ min-width:0; }
  .kpi .label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; }
  .kpi .value{ font-family:'Space Grotesk',sans-serif; font-size:23px; font-weight:600; margin-top:1px; letter-spacing:-.01em; }
  .kpi .value.red{ color:var(--red); } .kpi .value.green{ color:var(--green); } .kpi .value.amber{ color:var(--amber); }

  .body{ flex:1; display:grid; grid-template-columns: 1fr 460px; min-height:0; }
  #top10Body{ grid-template-columns: 1fr; overflow-y:auto; }
  .map-col{ position:relative; }
  #map{ height:100%; width:100%; }
  .legend{
    position:absolute; bottom:18px; left:18px; z-index:500; background:var(--paper);
    border:1px solid var(--line); border-radius:var(--r-md); padding:11px 15px; font-size:12px; color:var(--muted);
    box-shadow:var(--shadow-md);
  }
  .legend div{ display:flex; align-items:center; gap:8px; margin:3px 0; }
  .legend .sw{ width:10px; height:10px; border-radius:50%; }

  .side{ background:var(--paper); border-left:1px solid var(--line); overflow-y:auto; display:flex; flex-direction:column; }
  .side-header{ padding:16px 20px 14px 20px; border-bottom:1px solid var(--line); }
  .side-header h2{ font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin:0 0 4px 0; }
  .side-header p{ margin:0; font-size:12px; color:var(--muted); }

  .plan-general{ padding:14px 20px; border-bottom:1px solid var(--line); }
  .plan-general h3{ font-family:'Space Grotesk',sans-serif; font-size:13px; margin:0 0 8px 0; }
  table.pg{ width:100%; border-collapse:collapse; font-size:11.5px; }
  table.pg th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; color:var(--muted); padding:5px 4px; border-bottom:1px solid var(--line); }
  table.pg td{ padding:5px 4px; border-bottom:1px solid var(--mist); }
  table.pg td.num{ font-family:'IBM Plex Mono',monospace; font-weight:600; text-align:right; }

  .region-block{ padding:16px 20px; border-bottom:1px solid var(--line); }
  .region-block h3{ font-family:'Space Grotesk',sans-serif; font-size:13.5px; font-weight:600; margin:0 0 10px 0; display:flex; align-items:center; gap:8px; }
  table.region{ width:100%; border-collapse:collapse; font-size:12px; border-radius:var(--r-sm); overflow:hidden; }
  table.region th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); padding:6px 8px; border-bottom:1px solid var(--line); background:var(--mist); }
  table.region td{ padding:7px 8px; border-bottom:1px solid var(--mist); }
  table.region td.num{ font-family:'IBM Plex Mono',monospace; font-weight:600; text-align:right; }
  table.region tr.worst td{ background:#FBEDEA; }
  table.region tr{ cursor:pointer; transition:background .12s; }
  table.region tr:hover td{ background:var(--mist); }

  .cards{ padding:14px 20px; display:flex; flex-direction:column; gap:9px; }
  .card{
    border:1px solid var(--line); border-left:4px solid var(--line); border-radius:var(--r-md); padding:12px 14px 12px 12px;
    cursor:pointer; background:#fff; transition:box-shadow .15s, border-color .15s, transform .15s;
  }
  .card:hover{ box-shadow:var(--shadow-md); border-color:var(--nivea); transform:translateX(2px); }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; }
  .card-name{ font-weight:600; font-size:13.5px; }
  .card-msl{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:14.5px; }
  .card-sub{ font-size:11.5px; color:var(--muted); margin-top:4px; display:flex; justify-content:space-between; }
  .bar-track{ height:5px; border-radius:3px; background:var(--mist); margin-top:8px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:3px; }

  .store-row{ display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; border-bottom:1px solid var(--mist); transition:background .12s; }
  .store-row:hover{ background:var(--mist); }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; box-shadow:0 0 0 3px rgba(0,0,0,.03); }
  .store-row .meta{ min-width:0; flex:1; }
  .store-row .code{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--nivea-deep); font-weight:600; }
  .store-row .addr{ font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .store-row .msl{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; }

  .detail{ padding:18px 20px; }
  .detail h2{ font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:600; margin:0 0 2px 0; }
  .detail .addr{ font-size:12.5px; color:var(--muted); margin-bottom:12px; }
  .metric-row{ display:flex; gap:10px; margin-bottom:16px; }
  .metric-box{ flex:1; border:1px solid var(--line); border-radius:var(--r-md); padding:12px; text-align:center; background:var(--canvas); }
  .metric-box .m-label{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .metric-box .m-value{ font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:600; margin-top:3px; }

  table.skus{ width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:16px; }
  table.skus th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); padding:6px 4px; border-bottom:1px solid var(--line); }
  table.skus td{ padding:7px 4px; border-bottom:1px solid var(--mist); }
  table.skus td.msl{ font-family:'IBM Plex Mono',monospace; font-weight:700; text-align:right; }

  textarea.comment{ width:100%; min-height:84px; border:1px solid var(--line); border-radius:var(--r-md); padding:10px 12px; font-family:'Inter',sans-serif; font-size:13px; resize:vertical; background:var(--canvas); transition:border-color .15s; }
  textarea.comment:focus{ outline:none; border-color:var(--nivea); background:#fff; }
  .comment-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
  .save-btn{ background:var(--nivea); color:#fff; border:none; padding:8px 16px; border-radius:var(--r-sm); font-size:12.5px; font-weight:600; cursor:pointer; transition:background .15s, box-shadow .15s; }
  .save-btn:hover{ background:var(--nivea-deep); box-shadow:var(--shadow-sm); }
  .saved-note{ font-size:11px; color:var(--green); font-weight:600; }
  .back-link{ font-size:12px; color:var(--nivea); cursor:pointer; margin-bottom:12px; display:inline-block; font-weight:500; }
  .back-link:hover{ text-decoration:underline; }
  .flag-note{ font-size:11px; color:#B5732A; margin-top:5px; background:#FBF0E2; padding:5px 9px; border-radius:6px; }
  .partial-note{ font-size:11.5px; color:#8A5A1E; background:#FBF0E2; border-radius:var(--r-sm); padding:8px 12px; margin:10px 26px 0 26px; border-left:3px solid var(--amber); }

  .top10-wrap{ padding:24px 28px; overflow-y:auto; height:100%; }
  .top10-wrap h2{ font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; margin:0 0 4px 0; }
  .top10-wrap p.sub{ color:var(--muted); font-size:13px; margin:0 0 18px 0; }
  table.top10{ width:100%; border-collapse:collapse; font-size:13px; margin-bottom:30px; background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  table.top10 th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:10px 12px; border-bottom:1px solid var(--line); background:var(--mist); }
  table.top10 td{ padding:10px 12px; border-bottom:1px solid var(--mist); cursor:pointer; transition:background .12s; }
  table.top10 tr:hover td{ background:var(--canvas); }
  table.top10 td.num{ font-family:'IBM Plex Mono',monospace; font-weight:700; text-align:right; }
  table.top10 tr:first-child td{ font-weight:600; }
  .chart-block{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:20px 22px; box-shadow:var(--shadow-sm); }
  .chart-block h3{ font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; margin:0 0 4px 0; }
  .chart-block .chart-sub{ font-size:12px; color:var(--muted); margin:0 0 14px 0; }
  .chart-legend{ display:flex; gap:18px; margin-bottom:4px; font-size:12px; }
  .chart-legend span{ display:flex; align-items:center; gap:6px; font-weight:500; }
  .chart-legend .sw{ width:10px; height:10px; border-radius:50%; display:inline-block; }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover{ background:var(--faint); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">
      <div class="brand-mark"></div>
      <div class="title-text">
        <div class="eyebrow">Plan Backstock · Derma</div>
        <h1>Dashboard Gerencial — Cobertura MSL &amp; Backstock</h1>
      </div>
    </div>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="shelf-ticks"></div>

  <div class="view-tabs" id="viewTabs"></div>

  <div class="controlbar">
    <div class="week-tabs" id="weekTabsEl"></div>
    <div class="sku-filter" id="skuFilterWrap"></div>
    <div class="metric-toggle" id="metricToggle"></div>
  </div>

  <div id="partialNote"></div>
  <div class="kpirow" id="kpiRow"></div>

  <div class="chain-row" id="chainRow"></div>

  <div class="body" id="gerencialBody">
    <div class="map-col">
      <div id="map"></div>
      <div class="legend" id="legendBody"></div>
    </div>
    <div class="side" id="side"></div>
  </div>

  <div class="body" id="top10Body" style="display:none;">
    <div class="top10-wrap" id="top10Content"></div>
  </div>
</div>

function getSkuValue(r, month, sku){
  const list = getSkus(r, month);
  const found = list.find(s => s.sku === sku);
  return found ? found.msl : null;
}

function getWeekData(r, week){ return (r.weeks && r.weeks[week]) || null; }
function getSkus(r, week){ return (r.skus_by_week && r.skus_by_week[week]) || []; }
function getValue(r, metric, month){
  const mo = month || currentWeek;
  if(metric==='msl' && currentSku){
    return getSkuValue(r, mo, currentSku);
  }
  const md = getWeekData(r, mo);
  if(!md) return null;
  return metric==='msl' ? md.msl : md.backstock;
}
function getStatus(r, metric, month){
  const v = getValue(r, metric, month);
  if(v === null || v === undefined) return 'sin_dato';
  if(metric === 'msl'){
    if(v < 70) return 'rojo';
    if(v < 90) return 'ambar';
    return 'verde';
  }
  return v > 7 ? 'rojo' : 'verde';
}
function colorFor(status){ return {rojo:'#C0392B', ambar:'#D89A1F', verde:'#158A4A', sin_dato:'#9AA7B4'}[status] || '#9AA7B4'; }
function fmt1(n){ return (n===null||n===undefined) ? '—' : n.toFixed(1); }
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function metricLabel(){
  if(currentMetric==='msl' && currentSku) return 'MSL · ' + (currentSku.length>28 ? currentSku.slice(0,28)+'…' : currentSku);
  return currentMetric==='msl' ? 'MSL' : 'Backstock';
}
function sortByOpportunity(a, b){
  const va = getValue(a, currentMetric), vb = getValue(b, currentMetric);
  const na = va===null, nb = vb===null;
  if(na && nb) return 0;
  if(na) return 1;
  if(nb) return -1;
  return currentMetric==='msl' ? (va-vb) : (vb-va); // worst first
}

function buildGauge(pct, color, size){
  size = size || 46;
  const r = size/2 - 4;
  const c = size/2;
  const circ = 2*Math.PI*r;
  const clamped = pct===null ? 0 : Math.max(0, Math.min(100, pct));
  const offset = circ - (clamped/100)*circ;
  return `<svg class="gauge" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--mist)" stroke-width="4.5"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="4.5"
      stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
      transform="rotate(-90 ${c} ${c})"/>
  </svg>`;
}

function renderKPIs(){
  const recs = visibleRecords();
  const withData = recs.filter(r=>getValue(r,currentMetric)!==null);
  const avg = withData.length ? withData.reduce((a,r)=>a+getValue(r,currentMetric),0)/withData.length : null;
  const reds = recs.filter(r=>getStatus(r,currentMetric)==='rojo').length;
  const greens = recs.filter(r=>getStatus(r,currentMetric)==='verde').length;
  const cls = currentMetric==='msl' ? (avg<70?'red':avg<90?'amber':'green') : (avg>7?'red':'green');
  const cssVar = cls==='red' ? 'var(--red)' : cls==='amber' ? 'var(--amber)' : 'var(--green)';

  const universeScope = (state.responsable || state.supervisor) ? RECORDS.filter(r=>{
    if(state.responsable && r.responsable !== state.responsable) return false;
    if(state.supervisor && r.supervisor !== state.supervisor) return false;
    return true;
  }) : RECORDS;
  const targetTotal = universeScope.length;
  const visitedCount = recs.length;
  const coveragePct = targetTotal ? (visitedCount/targetTotal*100) : 0;
  const covClass = coveragePct < 50 ? 'red' : coveragePct < 85 ? 'amber' : 'green';
  const covVar = covClass==='red' ? 'var(--red)' : covClass==='amber' ? 'var(--amber)' : 'var(--green)';

  const greenPct = recs.length ? (greens/recs.length*100) : 0;
  const redPct = recs.length ? (reds/recs.length*100) : 0;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi">${buildGauge(coveragePct, covVar)}<div class="kbody"><div class="label">Salas visitadas / target</div><div class="value ${covClass}">${visitedCount} / ${targetTotal}</div></div></div>
    <div class="kpi">${buildGauge(avg, cssVar)}<div class="kbody"><div class="label">${metricLabel()} promedio</div><div class="value ${cls}">${fmt1(avg)}%</div></div></div>
    <div class="kpi">${buildGauge(greenPct, 'var(--green)')}<div class="kbody"><div class="label">Salas sanas (verde)</div><div class="value green">${greens}</div></div></div>
    <div class="kpi">${buildGauge(redPct, 'var(--red)')}<div class="kbody"><div class="label">Salas en rojo</div><div class="value red">${reds}</div></div></div>
  `;
}

function aggregate(recs){
  const withData = recs.filter(r=>getValue(r,currentMetric)!==null);
  const avg = withData.length ? withData.reduce((a,r)=>a+getValue(r,currentMetric),0)/withData.length : null;
  const reds = recs.filter(r=>getStatus(r,currentMetric)==='rojo').length;
  return {count:recs.length, avg, reds};
}
function tierColor(avg){
  if(avg===null) return '#9AA7B4';
  if(currentMetric==='msl') return avg<70?'#C0392B':avg<90?'#D89A1F':'#158A4A';
  return avg>7?'#C0392B':'#158A4A';
}
function barWidth(avg){ if(avg===null) return 0; return currentMetric==='msl' ? Math.min(avg,100) : Math.min(avg*6,100); }

function renderRegionRanking(){
  const recs = weekRecords();
  const regions = [...new Set(recs.map(getRegion))];
  const rows = regions.map(reg=>{
    const rr = recs.filter(r=>getRegion(r)===reg);
    return {region:reg, agg: aggregate(rr)};
  });
  rows.sort((a,b)=> currentMetric==='msl' ? (a.agg.avg??101)-(b.agg.avg??101) : (b.agg.avg??-1)-(a.agg.avg??-1));
  let html = `<div class="region-block"><h3>Ranking por región — de más débil a más fuerte (${metricLabel()})</h3><table class="region"><thead><tr><th>Región</th><th style="text-align:right;">Salas</th><th style="text-align:right;">Rojas</th><th style="text-align:right;">${metricLabel()}</th></tr></thead><tbody>`;
  rows.forEach((row, i)=>{
    const c = tierColor(row.agg.avg);
    html += `<tr class="${i===0?'worst':''}" onclick="focusRegion('${esc(row.region)}')"><td>${row.region}</td><td class="num">${row.agg.count}</td><td class="num" style="color:#C0392B;">${row.agg.reds}</td><td class="num" style="color:${c};">${fmt1(row.agg.avg)}%</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function renderSideNacional(){
  const responsables = [...new Set(weekRecords().map(r=>r.responsable))];
  const aggd = responsables.map(resp=>({resp, agg: aggregate(weekRecords().filter(r=>r.responsable===resp))}));
  aggd.sort((a,b)=> currentMetric==='msl' ? (a.agg.avg??101)-(b.agg.avg??101) : (b.agg.avg??-1)-(a.agg.avg??-1));
  let html = `<div class="side-header"><h2>Vista nacional</h2><p>Selecciona un responsable de zona para profundizar — vista actual: <b>${metricLabel()}</b>, ${WEEKS.find(m=>m.key===currentWeek).label}</p></div>`;
  html += `<div class="cards">`;
  aggd.forEach(({resp, agg})=>{
    const color = tierColor(agg.avg);
    html += `<div class="card" onclick="goResponsable('${esc(resp)}')">
      <div class="card-top"><span class="card-name">${resp}</span><span class="card-msl" style="color:${color};">${fmt1(agg.avg)}%</span></div>
      <div class="card-sub"><span>${agg.count} salas</span><span>${agg.reds} en rojo</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barWidth(agg.avg)}%;background:${color};"></div></div>
    </div>`;
  });
  html += `</div>`;
  html += renderRegionRanking();
  document.getElementById('side').innerHTML = html;
}

function renderSideResponsable(){
  const recs = weekRecords().filter(r=>r.responsable===state.responsable);
  const supervisors = [...new Set(recs.map(r=>r.supervisor))];
  const aggd = supervisors.map(sup=>({sup, agg: aggregate(recs.filter(r=>r.supervisor===sup))}));
  aggd.sort((a,b)=> currentMetric==='msl' ? (a.agg.avg??101)-(b.agg.avg??101) : (b.agg.avg??-1)-(a.agg.avg??-1));
  let html = `<div class="side-header"><span class="back-link" onclick="goNacional()">‹ Volver a Gerencia</span><h2>${state.responsable}</h2><p>Supervisores a su cargo — ordenados por oportunidad de <b>${metricLabel()}</b></p></div><div class="cards">`;
  aggd.forEach(({sup, agg})=>{
    const color = tierColor(agg.avg);
    html += `<div class="card" onclick="goSupervisor('${esc(state.responsable)}','${esc(sup)}')">
      <div class="card-top"><span class="card-name">${sup}</span><span class="card-msl" style="color:${color};">${fmt1(agg.avg)}%</span></div>
      <div class="card-sub"><span>${agg.count} salas</span><span>${agg.reds} en rojo</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barWidth(agg.avg)}%;background:${color};"></div></div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('side').innerHTML = html;
}

function renderSideSupervisor(){
  const recs = weekRecords().filter(r=>r.responsable===state.responsable && r.supervisor===state.supervisor).sort(sortByOpportunity);

  recs.forEach(r=>{

    html += `<div class="store-row" onclick="goToStore('${esc(r.codigo)}')">

    <div class="detail">
      <span class="back-link" onclick="goSupervisor('${esc(r.responsable)}','${esc(r.supervisor)}')">‹ Volver a ${r.supervisor}</span>
      <h2>${r.codigo}</h2>
      <div class="addr">${r.direccion} · ${r.comuna}</div>
      <div class="addr">Supervisor: <b>${r.supervisor}</b> · Responsable: <b>${r.responsable}</b></div>
      ${r.precision==='ciudad' ? '<div class="flag-note">Ubicación aproximada a nivel ciudad — confirmar dirección exacta</div>' : ''}
      ${r.precision==='sin_ubicar' ? '<div class="flag-note">Sin datos suficientes para geolocalizar esta dirección</div>' : ''}
      ${!md ? '<div class="flag-note">Esta sala no registra visita en '+WEEKS.find(m=>m.key===currentWeek).label+'</div>' : ''}
      <div class="metric-row">
        <div class="metric-box"><div class="m-label">MSL (sano ≥90%)</div><div class="m-value" style="color:${cMsl};">${fmt1(md?md.msl:null)}%</div></div>
        <div class="metric-box"><div class="m-label">Backstock (rojo &gt;7%)</div><div class="m-value" style="color:${cBs};">${fmt1(md?md.backstock:null)}%</div></div>
      </div>
      <table class="skus"><thead><tr><th>SKU foco (derma) — MSL</th><th style="text-align:right;"></th></tr></thead><tbody>${skuRows || '<tr><td colspan=2 style="color:#9AA7B4;">Sin datos de SKU este mes</td></tr>'}</tbody></table>
      <div class="label" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;color:#5B6B7C;margin-bottom:6px;">Comentario del supervisor</div>
      <textarea class="comment" id="commentBox" placeholder="¿Qué está pasando en esta sala? ¿Necesitas empuje con algún SKU?">${savedComment}</textarea>
      <div class="comment-actions">
        <button class="save-btn" onclick="saveComment('${r.codigo}')">Guardar comentario</button>

      </div>
      <p style="font-size:10.5px;color:#9AA7B4;margin-top:8px;">El comentario se envía a la hoja de Google que revisa gerencia. También queda visible aquí mientras esta pestaña del navegador siga abierta.</p>
    </div>
  `;
}

function renderTop10(){
  const recs = weekRecords().filter(r=>r.responsable!=='Sin Atención').slice().sort(sortByOpportunity).slice(0,10);
  let html = `<h2>Top 10 peores salas — ${metricLabel()}, ${WEEKS.find(m=>m.key===currentWeek).label}</h2><p class="sub">Solo salas con responsable asignado (Fernando o Cecilia) — la mayor oportunidad de mejora, primero.</p>`;
  html += `<table class="top10"><thead><tr><th>#</th><th>Código</th><th>Dirección</th><th>Responsable</th><th>Supervisor</th><th style="text-align:right;">${metricLabel()}</th></tr></thead><tbody>`;
  recs.forEach((r,i)=>{
    const c = colorFor(getStatus(r, currentMetric));
    html += `<tr onclick="goToStoreFromTop10('${esc(r.codigo)}')"><td>${i+1}</td><td style="font-family:'IBM Plex Mono',monospace;">${r.codigo}</td><td>${r.direccion}</td><td>${r.responsable}</td><td>${r.supervisor}</td><td class="num" style="color:${c};">${fmt1(getValue(r,currentMetric))}%</td></tr>`;
  });
  html += `</tbody></table>`;

  html += `<div class="chart-block"><h3>Rendimiento semanal por responsable — MSL</h3>`;
  html += `<div class="chart-legend">
    <span><span class="sw" style="background:#0057A8;"></span>Cecilia Sepúlveda</span>
    <span><span class="sw" style="background:#D89A1F;"></span>Fernando Cárdenas</span>
    <span><span class="sw" style="background:#C0392B;"></span>Sin Atención</span>
  </div>`;
  html += buildWeeklyChartSVG();
  html += `</div>`;

  document.getElementById('top10Content').innerHTML = html;
}

function goToStoreFromTop10(codigo){
  setView('gerencial');
  goToStore(codigo);
}
window.goToStoreFromTop10 = goToStoreFromTop10;

function buildWeeklyChartSVG(){
  const colors = {'Cecilia Sepulveda':'#0057A8','Fernando Cardenas':'#D89A1F','Sin Atención':'#C0392B'};
  const allLabels = [...new Set(Object.values(WEEKLY_BY_RESPONSABLE).flat().map(p=>p.label))];
  const W = 760, H = 260, padL = 40, padR = 20, padT = 20, padB = 30;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const x = i => padL + (allLabels.length<=1 ? plotW/2 : i/(allLabels.length-1)*plotW);
  const y = v => padT + plotH - (v/100*plotH);

  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;">`;
  svg += `<defs>`;
  Object.entries(colors).forEach(([resp,c])=>{
    const id = 'grad_'+resp.replace(/[^a-zA-Z]/g,'');
    svg += `<linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c}" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="${c}" stop-opacity="0"/>
    </linearGradient>`;
  });
  svg += `</defs>`;
  // gridlines
  [0,25,50,75,100].forEach(v=>{
    svg += `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="#E7EFF8" stroke-width="1"/>`;
    svg += `<text x="${padL-8}" y="${y(v)+3}" text-anchor="end" fill="#8698A8">${v}</text>`;
  });
  allLabels.forEach((lab,i)=>{
    svg += `<text x="${x(i)}" y="${H-8}" text-anchor="middle" fill="#5B6B7C" font-weight="600">${lab}</text>`;
  });
  Object.entries(WEEKLY_BY_RESPONSABLE).forEach(([resp, points])=>{
    const c = colors[resp] || '#9AA7B4';
    const id = 'grad_'+resp.replace(/[^a-zA-Z]/g,'');
    const idxPoints = points.map(p=>({...p, xi: allLabels.indexOf(p.label)})).sort((a,b)=>a.xi-b.xi);
    if(idxPoints.length>1){
      const areaPath = idxPoints.map((p,i)=> (i===0?'M':'L') + x(p.xi).toFixed(1) + ',' + y(p.msl).toFixed(1)).join(' ')
        + ` L${x(idxPoints[idxPoints.length-1].xi).toFixed(1)},${y(0).toFixed(1)} L${x(idxPoints[0].xi).toFixed(1)},${y(0).toFixed(1)} Z`;
      svg += `<path d="${areaPath}" fill="url(#${id})" stroke="none"/>`;
    }
    const path = idxPoints.map((p,i)=> (i===0?'M':'L') + x(p.xi).toFixed(1) + ',' + y(p.msl).toFixed(1)).join(' ');
    svg += `<path d="${path}" fill="none" stroke="${c}" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"/>`;
    idxPoints.forEach(p=>{
      svg += `<circle cx="${x(p.xi).toFixed(1)}" cy="${y(p.msl).toFixed(1)}" r="4.5" fill="#fff" stroke="${c}" stroke-width="2.5"/>`;
      svg += `<text x="${x(p.xi).toFixed(1)}" y="${y(p.msl)-10}" text-anchor="middle" fill="${c}" font-weight="700" font-size="11">${p.msl.toFixed(0)}%</text>`;
    });
  });
  svg += `</svg>`;
  return svg;
}

function saveComment(codigo){
  const r = RECORDS.find(x=>x.codigo===codigo);
  const texto = document.getElementById('commentBox').value;
  comments[codigo] = texto;
  const note = document.getElementById('savedNote');

  const useForm = GOOGLE_FORM_ID && GOOGLE_FORM_ENTRY_CODIGO && GOOGLE_FORM_ENTRY_SUPERVISOR && GOOGLE_FORM_ENTRY_COMENTARIO;
  const useScript = !!GOOGLE_SCRIPT_URL;

  if(!useForm && !useScript){
    note.textContent = 'Falta configurar Google Forms o Google Apps Script (ver instrucciones_google_forms.md)';
    note.style.color = '#C0392B';
    note.style.opacity = 1;
    setTimeout(()=>{ note.style.opacity = 0; }, 3500);
    return;
  }

  note.textContent = 'Guardando…';
  note.style.color = '#5B6B7C';
  note.style.opacity = 1;

  let request;
  if(useForm){
    const formData = new URLSearchParams();
    formData.append(GOOGLE_FORM_ENTRY_CODIGO, r.codigo);
    formData.append(GOOGLE_FORM_ENTRY_SUPERVISOR, r.supervisor);
    formData.append(GOOGLE_FORM_ENTRY_COMENTARIO, texto);
    request = fetch(`https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });
  } else {
    request = fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ codigo: r.codigo, supervisor: r.supervisor, comentario: texto })
    });
  }

  request.then(()=>{
    note.textContent = 'Guardado ✓';
    note.style.color = '#158A4A';
    setTimeout(()=>{ note.style.opacity = 0; }, 1800);
  }).catch(()=>{
    note.textContent = 'No se pudo enviar (revisa tu conexión)';
    note.style.color = '#C0392B';
    setTimeout(()=>{ note.style.opacity = 0; }, 3500);
  });
}
window.saveComment = saveComment;

function goNacional(){ state = {level:'nacional', responsable:null, supervisor:null, storeCode:null}; refresh(); }
function goResponsable(resp){ state = {level:'responsable', responsable:resp, supervisor:null, storeCode:null}; refresh(); }
function goSupervisor(resp, sup){ state = {level:'supervisor', responsable:resp, supervisor:sup, storeCode:null}; refresh(); }
function goToStore(codigo){
  const r = RECORDS.find(x=>x.codigo===codigo);
  state = {level:'store', responsable:r.responsable, supervisor:r.supervisor, storeCode:codigo};
  refresh();
  if(r.lat!==null && r.lng!==null){
    map.setView([r.lat, r.lng], 16, {animate:true});
    const found = markerRefs[codigo];
    if(found) found.openPopup();
  }
}
window.goNacional = goNacional; window.goResponsable = goResponsable; window.goSupervisor = goSupervisor; window.goToStore = goToStore;

function updateLegend(){
  const el = document.getElementById('legendBody');
  if(currentMetric==='msl'){
    el.innerHTML = `<div><span class="sw" style="background:#158A4A"></span> Sana — MSL ≥ 90%</div><div><span class="sw" style="background:#D89A1F"></span> Oportunidad media — MSL 70–90%</div><div><span class="sw" style="background:#C0392B"></span> Oportunidad alta — MSL &lt; 70%</div><div><span class="sw" style="background:#9AA7B4"></span> Sin ubicación exacta / sin dato</div>`;
  } else {
    el.innerHTML = `<div><span class="sw" style="background:#158A4A"></span> Sana — Backstock ≤ 7%</div><div><span class="sw" style="background:#C0392B"></span> Alerta — Backstock &gt; 7%</div><div><span class="sw" style="background:#9AA7B4"></span> Sin ubicación exacta / sin dato</div>`;
  }
}

function refresh(){
  renderViewTabs();
  renderControls();
  renderChainRow();
  renderBreadcrumb();
  renderKPIs();

  if(currentView==='gerencial'){
    renderMarkers();
    updateLegend();
    if(state.level==='nacional') renderSideNacional();
    else if(state.level==='responsable') renderSideResponsable();
    else if(state.level==='supervisor') renderSideSupervisor();
    else if(state.level==='store') renderSideStore();
  } else {
    renderTop10();
  }
}

refresh();
</script>
