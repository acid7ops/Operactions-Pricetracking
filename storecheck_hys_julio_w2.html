<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>H&amp;S Storecheck — Julio W2 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --nivea:#0057A8; --nivea-deep:#00294F; --nivea-mid:#0A3D73; --nivea-light:#E6F1FB;
  --ink:#0B1C2C; --muted:#5B6B7C; --faint:#8698A8;
  --paper:#FFFFFF; --canvas:#EEF3F9; --line:#DCE6F0; --mist:#E7EFF8;
  --green:#158A4A; --green-bg:#EAF3DE; --red:#C0392B; --red-bg:#FCEBEB;
  --amber:#B8620A; --amber-bg:#FFF3E0; --orange:#E65100;
  --quiebre:#7A1F3D; --quiebre-bg:#F7E6EC;
  --repl:#0057A8; --repl-bg:#E6F1FB;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
  --sh-sm:0 1px 3px rgba(10,27,46,.07);
  --sh-md:0 4px 16px rgba(10,27,46,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{
  font-family:'Inter',sans-serif;
  background:var(--canvas);
  color:var(--ink);
  font-size:12px;
  overflow-x:hidden;
  max-width:100vw;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}

/* ── Topbar ── */
.topbar{
  background:linear-gradient(135deg, var(--nivea-deep) 0%, var(--nivea-mid) 100%);
  padding:.6rem 1.4rem;
  display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 20px rgba(10,27,46,.18);
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--nivea-mid),var(--nivea),var(--nivea-mid));
}
.tb-brand{
  color:white;font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:-.01em;
  padding-right:1.1rem;border-right:1px solid rgba(255,255,255,.18);
  white-space:nowrap;display:flex;flex-direction:column;gap:1px;
}
.tb-brand::before{
  content:'H&S STORECHECK'; font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;letter-spacing:.14em;color:#A9CDEF;font-weight:500;
}
.tb-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.wbadge{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
  padding:3px 10px;border-radius:20px;letter-spacing:.04em;
  background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);
  white-space:nowrap;
}
.btn{
  font-family:'Inter',sans-serif;font-size:11px;padding:5px 13px;border-radius:var(--r-sm);
  border:none;cursor:pointer;font-weight:600;
  background:rgba(255,255,255,.15);color:white;transition:background .15s;letter-spacing:.01em;
}
.btn:hover{background:rgba(255,255,255,.28)}

/* ── Search bar ── */
.searchbar{
  background:var(--paper);border-bottom:1px solid var(--line);
  padding:.6rem 1.4rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  position:sticky;top:42px;z-index:199;box-shadow:var(--sh-sm);
}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:360px}
.search-input{
  width:100%;font-family:'IBM Plex Mono',monospace;font-size:11.5px;
  padding:7px 12px;border:1px solid var(--line);border-radius:20px;
  outline:none;color:var(--ink);background:var(--canvas);
  transition:border-color .15s,background .15s;
}
.search-input:focus{border-color:var(--nivea);background:white}
.search-drop{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:white;border:1px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--sh-md);max-height:280px;overflow-y:auto;z-index:250;display:none;
}
.search-drop.show{display:block}
.search-item{
  padding:7px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  border-bottom:.5px solid var(--mist);font-size:11px;
}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--nivea-light)}
.search-item .si-code{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--nivea-deep)}
.search-item .si-chain{font-size:9.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace}
.chain-filters{display:flex;gap:6px;flex-wrap:wrap}
.cbtn{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
  padding:4px 14px;border-radius:20px;border:1px solid var(--line);
  background:transparent;cursor:pointer;color:var(--muted);
  transition:all .15s;letter-spacing:.03em;white-space:nowrap;
}
.cbtn:hover{border-color:var(--nivea);color:var(--nivea)}
.cbtn.active{background:var(--nivea-deep);color:white;border-color:var(--nivea-deep)}

/* ── Page ── */
.page{max-width:1200px;margin:.9rem auto;padding:0 1.2rem}
.ph{
  background:white;border-radius:var(--r-lg);padding:.8rem 1.2rem;margin-bottom:.75rem;
  border-left:4px solid var(--nivea);display:flex;justify-content:space-between;align-items:flex-start;
  flex-wrap:wrap;gap:8px;box-shadow:var(--sh-sm);
}
.ph-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;letter-spacing:-.01em}
.ph-sub{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--faint);margin-top:3px;letter-spacing:.04em}
.ph-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{
  font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;
  padding:3px 9px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;
}
.b-blue{background:var(--nivea-light);color:var(--nivea)}
.b-dark{background:var(--nivea-deep);color:white}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-bad{background:var(--red-bg);color:var(--red)}
.nav-btn{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
  padding:4px 11px;border-radius:20px;border:1px solid var(--line);
  background:white;color:var(--muted);cursor:pointer;transition:all .15s;
}
.nav-btn:hover{border-color:var(--nivea);color:var(--nivea)}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:.75rem}
.kpi{
  background:white;border-radius:var(--r-md);padding:.7rem .9rem;
  border:1px solid var(--line);border-left:3px solid var(--line);
  box-shadow:var(--sh-sm);transition:box-shadow .15s,transform .15s;
}
.kpi:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.kpi-lbl{
  font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--faint);margin-bottom:4px;
}
.kpi-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.01em}
.kpi-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--faint);margin-top:2px;letter-spacing:.03em}

/* ── Layout ── */
.main{display:grid;grid-template-columns:1fr 260px;gap:.75rem;margin-bottom:.75rem}
.left-col{display:flex;flex-direction:column;gap:.75rem}
.rcol{display:flex;flex-direction:column;gap:.75rem}
.card{
  background:white;border-radius:var(--r-lg);padding:.85rem 1.1rem;
  border:1px solid var(--line);box-shadow:var(--sh-sm);
}
.sec-lbl{
  font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:var(--faint);margin-bottom:.6rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
}

/* ── Category tabs ── */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.cat-tab{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
  padding:6px 16px;border-radius:20px;border:1px solid var(--line);
  background:white;cursor:pointer;color:var(--muted);transition:all .15s;letter-spacing:.02em;
}
.cat-tab:hover{border-color:var(--nivea);color:var(--nivea)}
.cat-tab.active{background:var(--nivea-deep);color:white;border-color:var(--nivea-deep)}

/* ── Gap bar ── */
.gapbar{display:flex;height:22px;border-radius:6px;overflow:hidden;margin-bottom:6px;box-shadow:inset 0 0 0 1px var(--line)}
.gapbar-seg{display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;
  font-family:'IBM Plex Mono',monospace;color:white;white-space:nowrap;overflow:hidden;min-width:0}
.gap-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:9.5px;color:var(--muted);margin-bottom:4px}
.gap-legend span{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.gl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── Compare rows ── */
.cmp-row{margin-bottom:10px}
.cmp-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between}
.cmp-track{background:var(--mist);border-radius:20px;height:8px;overflow:hidden}
.cmp-fill{height:100%;border-radius:20px}

/* ── Product table ── */
table.pt{width:100%;border-collapse:collapse;font-size:11px}
table.pt th{
  font-family:'IBM Plex Mono',monospace;font-size:7.5px;font-weight:600;color:var(--faint);
  padding:5px 8px;border-bottom:1px solid var(--line);text-align:left;background:var(--canvas);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;
}
table.pt td{padding:6px 8px;border-bottom:.5px solid var(--mist);vertical-align:middle}
table.pt tr:last-child td{border-bottom:none}
table.pt tr:hover td{background:var(--mist)}
.prod-name{font-size:10.5px;line-height:1.35}
.status-pill{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;
  padding:2px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.02em;
}

/* ── Ranking (home) ── */
.rank-row{
  display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:.5px solid var(--mist);
  cursor:pointer;transition:background .1s;
}
.rank-row:hover{background:var(--mist)}
.rank-row:last-child{border-bottom:none}
.rank-pos{
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--faint);
  width:16px;text-align:center;flex-shrink:0;
}
.rank-code{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11.5px;color:var(--nivea-deep);width:56px;flex-shrink:0}
.rank-chain{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--faint);width:78px;flex-shrink:0}
.rank-bar-wrap{flex:1;background:var(--mist);border-radius:20px;height:7px;overflow:hidden}
.rank-bar{height:100%;border-radius:20px;background:var(--red)}
.rank-val{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;width:34px;text-align:right;flex-shrink:0}

/* ── Home hero ── */
.hero{
  background:white;border-radius:var(--r-lg);padding:1.4rem 1.4rem 1.1rem;margin-bottom:.75rem;
  border:1px solid var(--line);box-shadow:var(--sh-sm);text-align:center;
}
.hero-title{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:.3rem}
.hero-sub{font-size:11.5px;color:var(--muted);max-width:520px;margin:0 auto .9rem}

/* ── Chart ── */
.ch-wrap{position:relative;height:210px;width:100%}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:9.5px;color:var(--muted);margin-bottom:6px}
.legend span{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.lb{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── Empty state ── */
.empty-hint{text-align:center;padding:2rem 1rem;color:var(--faint);font-size:11.5px}

.footer{
  text-align:center;padding:.7rem;font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;color:var(--faint);margin-top:.3rem;letter-spacing:.04em;
}
@media print{
  .topbar,.searchbar{display:none}
  .page{padding:0;margin:0;max-width:100%}
}
@media(max-width:860px){
  .main{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

function pct(v){ return v == null ? '—' : Math.round(v*100) + '%'; }
function pctColor(v, good){
  // good=true: higher is better (msl); good=false: lower is better (gap metrics)
  if (v == null) return 'var(--faint)';
  if (good) return v >= 0.75 ? 'var(--green)' : v >= 0.55 ? 'var(--amber)' : 'var(--red)';
  return v <= 0.05 ? 'var(--green)' : v <= 0.15 ? 'var(--amber)' : 'var(--red)';
}

function salaList(){
  return Object.keys(DATA.salas).sort();
}

function renderChainFilters(){
  var html = '<button class="cbtn' + (curChain==='ALL'?' active':'') + '" onclick="setChain(\'ALL\')">Todas las cadenas</button>';
  CHAINS.forEach(function(c){
    html += '<button class="cbtn' + (curChain===c?' active':'') + '" onclick="setChain(\'' + c + '\')">' + c + '</button>';
  });
  document.getElementById('chain-filters').innerHTML = html;
}

function setChain(c){
  curChain = c;
  renderChainFilters();
  if (!curSala) renderHome();
}

function onSearchInput(){
  var q = document.getElementById('search-input').value.trim().toUpperCase();
  var drop = document.getElementById('search-drop');
  if (!q){ drop.classList.remove('show'); drop.innerHTML=''; return; }
  var matches = salaList().filter(function(code){
    var d = DATA.salas[code];
    return code.toUpperCase().indexOf(q) === 0 || d.chain.toUpperCase().indexOf(q) >= 0;
  }).slice(0, 10);
  if (!matches.length){ drop.classList.remove('show'); drop.innerHTML=''; return; }
  drop.innerHTML = matches.map(function(code){
    var d = DATA.salas[code];
    return '<div class="search-item" onclick="selectSala(\'' + code + '\')">' +
      '<span class="si-code">' + code + '</span><span class="si-chain">' + d.chain + ' &middot; MSL ' + pct(d.general.msl) + '</span></div>';
  }).join('');
  drop.classList.add('show');
}

document.addEventListener('click', function(e){
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('search-drop').classList.remove('show');
  }
});

function selectSala(code){
  curSala = code;
  curCat = 'General';
  selMonthIdx = null;
  document.getElementById('search-input').value = '';
  document.getElementById('search-drop').classList.remove('show');
  renderSala();
}

function goHome(){
  curSala = null;
  renderHome();
}

/* ---------------- HOME ---------------- */
function renderHome(){
  var salas = salaList().filter(function(c){ return curChain==='ALL' || DATA.salas[c].chain === curChain; });
  var t = DATA.total;

  var kpis = [
    {lbl:'MSL General', val: pct(t.msl), c: pctColor(t.msl,true), sub:'MSL'},
    {lbl:'Void', val: pct(t.void), c: pctColor(t.void,false), sub:'Catalogación'},
    {lbl:'Backstock', val: pct(t.back), c: pctColor(t.back,false), sub:'Stock Fantasma'},
    {lbl:'Replenishment', val: pct(t.repl), c: pctColor(t.repl,false), sub:'Replenishment'},
    {lbl:'Quiebre', val: pct(t.quiebre), c: pctColor(t.quiebre,false), sub:'Quiebre'},
  ];
  var kpisHtml = kpis.map(function(k){
    return '<div class="kpi" style="border-left-color:' + k.c + '"><div class="kpi-lbl">' + k.lbl + '</div>' +
      '<div class="kpi-val" style="color:' + k.c + '">' + k.val + '</div><div class="kpi-sub">' + k.sub + ' &middot; ' + salas.length + ' salas</div></div>';
  }).join('');

  // ranking: worst by (void + quiebre)
  var ranked = salas.map(function(c){
    var g = DATA.salas[c].general;
    return {code:c, chain:DATA.salas[c].chain, gap: g.void + g.quiebre, msl: g.msl};
  }).sort(function(a,b){ return b.gap - a.gap; }).slice(0, 12);

  var rankHtml = ranked.map(function(r, i){
    var pctv = Math.round(r.gap*100);
    return '<div class="rank-row" onclick="selectSala(\'' + r.code + '\')">' +
      '<div class="rank-pos">' + (i+1) + '</div>' +
      '<div class="rank-code">' + r.code + '</div>' +
      '<div class="rank-chain">' + r.chain + '</div>' +
      '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + Math.min(pctv,100) + '%"></div></div>' +
      '<div class="rank-val" style="color:var(--red)">' + pctv + '%</div></div>';
  }).join('');

  var chainCardsHtml = CHAINS.map(function(c){
    var d = DATA.chains[c];
    return '<div class="kpi" style="border-left-color:' + pctColor(d.msl,true) + ';cursor:pointer" onclick="setChain(\'' + c + '\')">' +
      '<div class="kpi-lbl">' + c + '</div>' +
      '<div class="kpi-val" style="font-size:18px;color:' + pctColor(d.msl,true) + '">' + pct(d.msl) + '</div>' +
      '<div class="kpi-sub">MSL promedio &middot; Void ' + pct(d.void) + '</div></div>';
  }).join('');

  document.getElementById('page').innerHTML =
    '<div class="hero">' +
      '<div class="hero-title">Storecheck H&amp;S &mdash; Julio W2 2026</div>' +
      '<div class="hero-sub">Busca una sala en el buscador superior o revisa el ranking de salas con mayor oportunidad para priorizar tu recorrido.</div>' +
    '</div>' +
    '<div class="kpis">' + kpisHtml + '</div>' +
    '<div class="main">' +
      '<div class="left-col">' +
        '<div class="card">' +
          '<div class="sec-lbl"><span>Salas con mayor oportunidad (Void + Quiebre)</span><span style="font-weight:400;text-transform:none;font-size:9px;color:var(--faint)">click para ver el detalle</span></div>' +
          rankHtml +
        '</div>' +
      '</div>' +
      '<div class="rcol">' +
        '<div class="card"><div class="sec-lbl">Promedio por cadena</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px">' + chainCardsHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('footer').textContent =
    'H&S Storecheck · Julio W2 2026 · ' + salas.length + ' salas · ' +
    new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

/* ---------------- SALA DETAIL ---------------- */
function gapBarHtml(m){
  var segs = STATUS_ORDER.map(function(k){ return {k:k, v:m[k]||0}; });
  var html = '<div class="gapbar">';
  segs.forEach(function(s){
    if (s.v <= 0) return;
    var w = Math.round(s.v*1000)/10;
    html += '<div class="gapbar-seg" style="width:' + w + '%;background:' + STATUS[s.k].color + '" title="' + STATUS[s.k].label + ': ' + pct(s.v) + '">' + (w>=8 ? Math.round(s.v*100)+'%' : '') + '</div>';
  });
  html += '</div>';
  return html;
}
function gapLegendHtml(){
  return '<div class="gap-legend">' + STATUS_ORDER.map(function(k){
    return '<span><span class="gl-dot" style="background:' + STATUS[k].color + '"></span>' + STATUS[k].label + '</span>';
  }).join('') + '</div>';
}
function cmpRowHtml(lbl, sala, chainAvg, totalAvg, good){
  var maxv = Math.max(sala, chainAvg, totalAvg, .01);
  function bar(v, color){
    return '<div class="cmp-track"><div class="cmp-fill" style="width:' + Math.round(v/maxv*100) + '%;background:' + color + '"></div></div>';
  }
  return '<div class="cmp-row">' +
    '<div class="cmp-lbl"><span>' + lbl + ' — esta sala</span><span style="color:' + pctColor(sala,good) + ';font-weight:700">' + pct(sala) + '</span></div>' + bar(sala, pctColor(sala,good)) +
    '<div class="cmp-lbl" style="margin-top:5px"><span>Promedio cadena</span><span>' + pct(chainAvg) + '</span></div>' + bar(chainAvg, '#B9C8D6') +
    '<div class="cmp-lbl" style="margin-top:5px"><span>Promedio nacional</span><span>' + pct(totalAvg) + '</span></div>' + bar(totalAvg, '#D8DFE6') +
  '</div>';
}

function renderSala(){
  var d = DATA.salas[curSala];
  var chainAvg = DATA.chains[d.chain];
  var totalAvg = DATA.total;

  var badges = '<span class="badge b-dark">' + d.chain + '</span>' +
    '<span class="badge ' + (d.general.msl>=0.75?'b-ok':d.general.msl>=0.55?'b-warn':'b-bad') + '">MSL ' + pct(d.general.msl) + '</span>' +
    '<span class="badge b-blue">Julio W2 2026</span>';

  var otherSalas = salaList().filter(function(c){ return DATA.salas[c].chain === d.chain; });
  var idx = otherSalas.indexOf(curSala);

  document.getElementById('page').innerHTML =
    '<div class="ph">' +
      '<div><div class="ph-title">Sala ' + curSala + '</div><div class="ph-sub">' + d.chain + ' &middot; Storecheck Julio W2 2026</div></div>' +
      '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">' +
        '<div class="ph-badges">' + badges + '</div>' +
        '<div style="display:flex;gap:5px">' +
          '<button class="nav-btn" onclick="goHome()">&larr; Inicio</button>' +
          '<button class="nav-btn" onclick="stepSala(-1)"' + (idx<=0?' disabled style="opacity:.4"':'') + '>&larr; Sala anterior</button>' +
          '<button class="nav-btn" onclick="stepSala(1)"' + (idx>=otherSalas.length-1?' disabled style="opacity:.4"':'') + '>Sala siguiente &rarr;</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="kpis" id="kpis"></div>' +
    '<div class="cat-tabs" id="cat-tabs"></div>' +
    '<div id="cat-body"></div>' +
    '<div class="footer">Storecheck H&amp;S &middot; ' + curSala + ' &middot; Julio W2 2026</div>';

  window._otherSalas = otherSalas;

  renderKpis(d);
  renderCatTabs();
  renderCatBody();
}

function stepSala(dir){
  var list = window._otherSalas;
  var idx = list.indexOf(curSala) + dir;
  if (idx < 0 || idx >= list.length) return;
  selectSala(list[idx]);
}

function renderKpis(d){
  var g = d.general;
  var kpis = [
    {lbl:'MSL', val: pct(g.msl), c: pctColor(g.msl,true)},
    {lbl:'Void', val: pct(g.void), c: pctColor(g.void,false)},
    {lbl:'Backstock', val: pct(g.back), c: pctColor(g.back,false)},
    {lbl:'Replenishment', val: pct(g.repl), c: pctColor(g.repl,false)},
    {lbl:'Quiebre', val: pct(g.quiebre), c: pctColor(g.quiebre,false)},
  ];
  document.getElementById('kpis').innerHTML = kpis.map(function(k){
    return '<div class="kpi" style="border-left-color:' + k.c + '"><div class="kpi-lbl">' + k.lbl + '</div>' +
      '<div class="kpi-val" style="color:' + k.c + '">' + k.val + '</div></div>';
  }).join('');
}

function renderCatTabs(){
  var tabs = ['General'].concat(CATS).concat(['Sell Out']);
  document.getElementById('cat-tabs').innerHTML = tabs.map(function(t){
    var lbl = t === 'General' ? 'General' : t === 'Sell Out' ? 'Sell Out' : CAT_LABELS[t];
    return '<button class="cat-tab' + (curCat===t?' active':'') + '" onclick="setCat(\'' + t + '\')">' + lbl + '</button>';
  }).join('');
}

function setCat(c){
  curCat = c;

}

    '<div class="card" style="margin-bottom:.75rem">' +
      '<div class="sec-lbl">Gap categoría ' + CAT_LABELS[curCat] + '</div>' +
      gapBarHtml(cat.agg) + gapLegendHtml() +
    '</div>' +
    '<div class="card">' +
      '<div class="sec-lbl"><span>Detalle por SKU &middot; ' + rows.length + ' productos</span></div>' +
      '<table class="pt"><thead><tr><th>Producto</th><th style="width:120px">Estado</th></tr></thead><tbody>' + tableRows + '</tbody></table>' +
    '</div>';
}

function catMiniBars(d){
  return CATS.map(function(c){
    var cat = d.cat[c];
    if (!cat) return '';
    return '<div style="margin-bottom:10px">' +
      '<div class="cmp-lbl"><span>' + CAT_LABELS[c] + '</span><span style="cursor:pointer;color:var(--nivea);font-weight:600" onclick="setCat(\'' + c + '\')">Ver SKU &rarr;</span></div>' +
      gapBarHtml(cat.agg) +
    '</div>';
  }).join('');
}

var MESES_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function monthLabel(m){
  var parts = m.split('-');
  return MESES_ES[parseInt(parts[1],10)-1] + ' ' + parts[0];
}

function lastNonNullIdx(vals){
  for (var i = vals.length-1; i >= 0; i--) if (vals[i] != null) return i;
  return vals.length-1;
}

function onSelloutMonthChange(idx){
  selMonthIdx = parseInt(idx, 10);
  renderCatBody();
}

function renderSellOut(d, body){
  var months = DATA.months;
  var vals = d.sellout || [];
  var fmt = function(v){ return v==null ? '—' : '$' + Math.round(v).toLocaleString('es-CL'); };

  if (selMonthIdx == null || selMonthIdx < 0 || selMonthIdx >= vals.length) {
    selMonthIdx = lastNonNullIdx(vals);
  }
  var idx = selMonthIdx;
  var selVal = vals[idx];
  var yoyIdx = idx - 12;
  var sameMonthLastYear = yoyIdx >= 0 ? vals[yoyIdx] : null;
  var yoy = (selVal != null && sameMonthLastYear) ? Math.round((selVal/sameMonthLastYear-1)*100) : null;

  var win = [];
  for (var k = idx-12; k <= idx-1; k++){ if (k >= 0 && vals[k] != null) win.push(vals[k]); }
  var avg12 = win.length ? win.reduce(function(a,b){return a+b},0)/win.length : null;

  var monthOptions = months.map(function(m, i){
    return '<option value="' + i + '"' + (i===idx?' selected':'') + '>' + monthLabel(m) + '</option>';
  }).join('');

  body.innerHTML =
    '<div class="card" style="margin-bottom:.75rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
      '<span class="sec-lbl" style="margin-bottom:0">Mes de referencia</span>' +
      '<select id="sellout-month-select" onchange="onSelloutMonthChange(this.value)" style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);background:var(--canvas);color:var(--ink)">' + monthOptions + '</select>' +
      '<span style="font-size:9.5px;color:var(--faint)">o haz click directamente en un punto del gráfico</span>' +
    '</div>' +
    '<div class="kpis" style="grid-template-columns:repeat(3,1fr)">' +
      '<div class="kpi" style="border-left-color:var(--nivea)"><div class="kpi-lbl">' + monthLabel(months[idx]) + '</div><div class="kpi-val" style="font-size:17px">' + fmt(selVal) + '</div></div>' +
      '<div class="kpi" style="border-left-color:var(--nivea)"><div class="kpi-lbl">Promedio 12 meses previos</div><div class="kpi-val" style="font-size:17px">' + fmt(avg12) + '</div></div>' +
      '<div class="kpi" style="border-left-color:' + (yoy==null?'var(--faint)':yoy>=0?'var(--green)':'var(--red)') + '"><div class="kpi-lbl">Variación YoY</div><div class="kpi-val" style="font-size:17px;color:' + (yoy==null?'var(--faint)':yoy>=0?'var(--green)':'var(--red)') + '">' + (yoy==null?'—':(yoy>=0?'+':'')+yoy+'%') + '</div><div class="kpi-sub">' + (sameMonthLastYear!=null ? 'vs ' + monthLabel(months[yoyIdx]) : 'sin dato año anterior') + '</div></div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="sec-lbl">Sell out mensual &mdash; ' + curSala + '</div>' +
      '<div class="ch-wrap"><canvas id="chart-sellout"></canvas></div>' +
    '</div>';

  var pointColors = vals.map(function(v, i){ return i === idx ? '#E65100' : '#0057A8'; });
  var pointRadii  = vals.map(function(v, i){ return i === idx ? 6 : 2.5; });

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart-sellout'), {
    type: 'line',
    data: { labels: months, datasets: [
      {label:'Sell out', data: vals, borderColor:'#0057A8', backgroundColor:'rgba(0,87,168,.08)',
       borderWidth:2, tension:.3, pointRadius:pointRadii, pointHoverRadius:7,
       pointBackgroundColor:pointColors, spanGaps:true, fill:true}
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      onClick:function(evt, elements){
        if (elements && elements.length){ onSelloutMonthChange(elements[0].index); }
      },
      onHover:function(evt, elements){
        evt.native.target.style.cursor = elements && elements.length ? 'pointer' : 'default';
      },
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:function(c){return 'Sell out: '+fmt(c.parsed.y);}}}},
      scales:{
        x:{grid:{color:'rgba(0,0,0,0.04)'}, ticks:{font:{size:8},maxRotation:40,autoSkip:true,maxTicksLimit:14,color:'#aaa'}},
        y:{grid:{color:'rgba(0,0,0,0.04)'}, ticks:{font:{size:8},color:'#aaa',callback:function(v){return '$'+(v/1000000).toFixed(0)+'M';}}},
      }
    }
  });
}

/* ---------------- INIT ---------------- */
renderChainFilters();
renderHome();
</script>
